<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controlador Finanzas 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f4f6f9; color: #1a1a2e; min-height: 100vh; }
  .topbar { background: #1a1a2e; color: #fff; padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  .topbar h1 { font-size: 18px; font-weight: 600; }
  .topbar .meta { font-size: 12px; opacity: 0.6; margin-top: 3px; }
  .refresh-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .refresh-btn:hover { background: rgba(255,255,255,0.2); }
  .container { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 1.5rem; }
  .kpi { background: #fff; border-radius: 12px; padding: 1.25rem; box-shadow: 0 1px 4px rgba(0,0,0,0.06); border-top: 3px solid #e0e0e0; }
  .kpi.pos { border-top-color: #1D9E75; }
  .kpi.neg { border-top-color: #D85A30; }
  .kpi.bal-pos { border-top-color: #185FA5; }
  .kpi.bal-neg { border-top-color: #a32d2d; }
  .kpi-label { font-size: 11px; color: #888; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .kpi-value { font-size: 20px; font-weight: 700; color: #1a1a2e; word-break: break-all; }
  .kpi.pos .kpi-value { color: #1D9E75; }
  .kpi.neg .kpi-value { color: #D85A30; }
  .kpi.bal-pos .kpi-value { color: #185FA5; }
  .kpi.bal-neg .kpi-value { color: #a32d2d; }
  .kpi-sub { font-size: 11px; color: #aaa; margin-top: 6px; }
  .filter-card { background: #fff; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1.5rem; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .filter-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
  .filter-group { display: flex; flex-direction: column; gap: 4px; }
  .filter-group label { font-size: 11px; color: #888; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; }
  .filter-group select { border: 1px solid #e0e0e0; border-radius: 6px; padding: 5px 10px; font-size: 13px; background: #f9f9f9; color: #1a1a2e; cursor: pointer; min-width: 120px; }
  .filter-group select[multiple] { height: 80px; }
  .filter-hint { font-size: 11px; color: #aaa; margin-top: 4px; }
  .clear-btn { background: #f4f6f9; border: 1px solid #e0e0e0; border-radius: 6px; padding: 5px 14px; font-size: 12px; cursor: pointer; color: #555; align-self: flex-end; }
  .clear-btn:hover { background: #e8eaed; }
  .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 1.5rem; }
  .chart-card { background: #fff; border-radius: 12px; padding: 1.25rem; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .chart-card.full { grid-column: 1 / -1; }
  .chart-title { font-size: 12px; font-weight: 600; color: #555; margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.4px; }
  .table-card { background: #fff; border-radius: 12px; padding: 1.25rem; box-shadow: 0 1px 4px rgba(0,0,0,0.06); overflow-x: auto; margin-bottom: 1.5rem; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px 10px; color: #888; font-weight: 600; border-bottom: 2px solid #f0f0f0; font-size: 11px; text-transform: uppercase; white-space: nowrap; }
  td { padding: 8px 10px; color: #1a1a2e; border-bottom: 1px solid #f5f5f5; white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafafa; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .ing { background: #e1f5ee; color: #0F6E56; }
  .eg  { background: #faece7; color: #993C1D; }
  .rank-bar { height: 6px; border-radius: 3px; background: #1D9E75; display: inline-block; vertical-align: middle; margin-left: 8px; }
  .tabs { display: flex; gap: 4px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .tab { padding: 8px 18px; border-radius: 8px; font-size: 13px; cursor: pointer; border: 1px solid #e0e0e0; background: #fff; color: #555; font-weight: 500; }
  .tab.active { background: #1a1a2e; color: #fff; border-color: #1a1a2e; }
  .section { display: none; }
  .section.active { display: block; }
  .loading { text-align: center; padding: 4rem; color: #aaa; font-size: 15px; }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #e0e0e0; border-top-color: #185FA5; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .err { background: #fff0ed; border-left: 4px solid #D85A30; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; font-size: 13px; color: #7a2e10; word-break: break-all; }
  @media (max-width: 640px) { .charts-grid { grid-template-columns: 1fr; } .chart-card.full { grid-column: 1; } }
</style>
</head>
<body>
<div class="topbar">
  <div>
    <h1>📊 Controlador Finanzas 2026</h1>
    <div class="meta" id="meta-txt">Conectando...</div>
  </div>
  <button class="refresh-btn" onclick="loadData()">↻ Actualizar</button>
</div>
<div class="container">
  <div id="err-box" style="display:none"></div>
  <div id="app"><div class="loading"><span class="spinner"></span>Cargando datos...</div></div>
</div>
<script>
const CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRiMekDVhvEC1crwqEsgKj-S9FX9rkMhuzrQ84C-8SCo-qFD2oi6943XF6l6PUVzGLsVhyJVUSMztHa/pub?gid=1817920401&single=true&output=csv';
let allRows = [], C = {}, chartObjs = {};
const $ = id => document.getElementById(id);

function fmt(n) {
  return '$' + new Intl.NumberFormat('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}).format(Math.abs(n||0));
}

function parseNum(v) {
  if (!v && v !== 0) return 0;
  let s = String(v).trim().replace(/[^0-9.,\-]/g, '');
  if (!s || s === '-') return 0;
  const hasCommaDecimal = /,\d{1,2}$/.test(s) && s.includes('.');
  const hasCommaOnly = /,\d{1,2}$/.test(s) && !s.includes('.');
  if (hasCommaDecimal) { s = s.replace(/\./g, '').replace(',', '.'); }
  else if (hasCommaOnly) { s = s.replace(',', '.'); }
  else { s = s.replace(/,/g, ''); }
  const n = parseFloat(s);
  return isNaN(n) ? 0 : n;
}

function parseDate(v) {
  if (!v) return null;
  const s = String(v).trim();
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.substring(0,7);
  const dmy = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (dmy) {
    const d = parseInt(dmy[1]), mo = parseInt(dmy[2]), y = parseInt(dmy[3]);
    if (d > 12) return `${y}-${String(mo).padStart(2,'0')}`;
    return `${y}-${String(mo).padStart(2,'0')}`;
  }
  const dmonth = s.match(/^(\d{1,2})[\/\-]([A-Za-z]{3})[\/\-](\d{2,4})/);
  if (dmonth) {
    const months = {jan:'01',feb:'02',mar:'03',apr:'04',may:'05',jun:'06',jul:'07',aug:'08',sep:'09',oct:'10',nov:'11',dec:'12'};
    const mo = months[dmonth[2].toLowerCase()] || '01';
    const y = dmonth[3].length === 2 ? '20'+dmonth[3] : dmonth[3];
    return `${y}-${mo}`;
  }
  return null;
}

function getYear(v) { const m = parseDate(v); return m ? m.substring(0,4) : null; }

function mapCols(fields) {
  const find = (...terms) => fields.find(f => terms.some(t => f.toLowerCase().replace(/[\s\/\-_]/g,'').includes(t.toLowerCase().replace(/[\s\/\-_]/g,'')))) || null;
  return {
    fecha:    find('FECHA'),
    ano:      find('ANO','AÑO','YEAR'),
    mes:      find('MES','MONTH'),
    ingEg:    find('INGRESOEGRESO','INGRESO'),
    banco:    find('BANCO'),
    tipo:     find('TIPO'),
    cat:      find('CATEGORIA','CATEGORÍA'),
    coment:   find('COMENTARIOS'),
    benef:    find('BENEFICIARIO'),
    dueno:    find('DUEÑO','DUENO'),
    credito:  find('CREDITO','CRÉDITO'),
    debito:   find('DEBITO','DÉBITO'),
    montoUSD: find('MONTOUSD'),
    mLimpio:  find('MOntoLimpio','MONTOLIMPIO','Monto_Limpio'),
  };
}

function isIngreso(row) {
  const v = String(row[C.ingEg]||'').toLowerCase().trim();
  return v.includes('ingr') || v.includes('entr') || v.includes('abono') || v === 'i';
}

function getMonto(row) {
  if (C.montoUSD) { const v = parseNum(row[C.montoUSD]); if (v !== 0) return Math.abs(v); }
  if (C.mLimpio)  { const v = parseNum(row[C.mLimpio]);  if (v !== 0) return Math.abs(v); }
  if (isIngreso(row) && C.credito) { const v = parseNum(row[C.credito]); if (v !== 0) return Math.abs(v); }
  if (!isIngreso(row) && C.debito) { const v = parseNum(row[C.debito]);  if (v !== 0) return Math.abs(v); }
  return 0;
}

function killCharts() {
  Object.values(chartObjs).forEach(c => { try { c.destroy(); } catch(e){} });
  chartObjs = {};
}

function getSelected(id) {
  const el = $(id); if (!el) return [];
  return Array.from(el.selectedOptions).map(o => o.value).filter(v => v !== '');
}

function applyFilters() {
  const tipoSel  = getSelected('f-tipo');
  const bancoSel = getSelected('f-banco');
  const catSel   = getSelected('f-cat');
  const tipoTSel = getSelected('f-subtipo');
  const anoSel   = getSelected('f-ano');
  const mesSel   = getSelected('f-mes');
  return allRows.filter(r => {
    if (tipoSel.length  && !tipoSel.includes(isIngreso(r)?'Ingreso':'Egreso')) return false;
    if (bancoSel.length && !bancoSel.includes((r[C.banco]||'').trim())) return false;
    if (catSel.length   && !catSel.includes((r[C.cat]||'').trim())) return false;
    if (tipoTSel.length && !tipoTSel.includes((r[C.tipo]||'').trim())) return false;
    if (anoSel.length) {
      const y = String(r[C.ano]||'').trim() || getYear(r[C.fecha]) || '';
      if (!anoSel.includes(y)) return false;
    }
    if (mesSel.length) {
      const m = String(r[C.mes]||'').trim().toLowerCase();
      const mNum = parseDate(r[C.fecha]); const mShort = mNum ? mNum.substring(5,7) : '';
      if (!mesSel.includes(m) && !mesSel.includes(mShort)) return false;
    }
    return true;
  });
}

function render(rows) {
  killCharts();
  const ing = rows.filter(r => isIngreso(r));
  const eg  = rows.filter(r => !isIngreso(r));
  const totalIng = ing.reduce((s,r) => s + getMonto(r), 0);
  const totalEg  = eg.reduce((s,r)  => s + getMonto(r), 0);
  const bal = totalIng - totalEg;

  const anos   = [...new Set(allRows.map(r => String(r[C.ano]||getYear(r[C.fecha])||'').trim()).filter(Boolean))].sort();
  const meses  = [...new Set(allRows.map(r => String(r[C.mes]||'').trim()).filter(Boolean))].sort();
  const bancos = [...new Set(allRows.map(r => (r[C.banco]||'').trim()).filter(Boolean))].sort();
  const cats   = [...new Set(allRows.map(r => (r[C.cat]||'').trim()).filter(Boolean))].sort();
  const tipos  = [...new Set(allRows.map(r => (r[C.tipo]||'').trim()).filter(Boolean))].sort();

  const rankBenef = {};
  ing.forEach(r => {
    const b = (r[C.benef]||r[C.dueno]||'Sin beneficiario').trim();
    if (!rankBenef[b]) rankBenef[b] = {total:0, count:0, meses:{}};
    rankBenef[b].total += getMonto(r);
    rankBenef[b].count++;
    const mes = parseDate(r[C.fecha]) || 'N/A';
    rankBenef[b].meses[mes] = (rankBenef[b].meses[mes]||0) + getMonto(r);
  });
  const rankList = Object.entries(rankBenef).sort((a,b)=>b[1].total-a[1].total);
  const maxRank = rankList[0]?.[1]?.total || 1;

  const recent = [...rows].reverse().slice(0,30);
  const tbody = recent.map(r => {
    const esIng = isIngreso(r); const monto = getMonto(r);
    return `<tr>
      <td>${r[C.fecha]||''}</td>
      <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis">${r[C.coment]||''}</td>
      <td>${r[C.banco]||''}</td>
      <td>${r[C.cat]||''}</td>
      <td>${r[C.tipo]||''}</td>
      <td><span class="badge ${esIng?'ing':'eg'}">${esIng?'Ingreso':'Egreso'}</span></td>
      <td style="text-align:right;font-weight:600;color:${esIng?'#1D9E75':'#D85A30'}">${esIng?'+':'-'}${fmt(monto)}</td>
    </tr>`;
  }).join('');

  const rankRows = rankList.slice(0,20).map(([b,d],i) => {
    const pct = Math.round((d.total/maxRank)*100);
    const mesesList = Object.entries(d.meses).sort((a,b2)=>b2[1]-a[1]).slice(0,3).map(([m,v])=>`${m}: ${fmt(v)}`).join(' | ');
    return `<tr>
      <td style="font-weight:600">${i+1}</td>
      <td>${b}</td>
      <td>${d.count}</td>
      <td style="text-align:right;color:#1D9E75;font-weight:600">${fmt(d.total)}</td>
      <td><span class="rank-bar" style="width:${pct}px;max-width:120px"></span></td>
      <td style="font-size:11px;color:#888">${mesesList}</td>
    </tr>`;
  }).join('');

  const hint = '<div class="filter-hint">Ctrl+clic para varios</div>';

  $('app').innerHTML = `
    <div class="kpi-grid">
      <div class="kpi pos"><div class="kpi-label">↑ Ingresos USD</div><div class="kpi-value">${fmt(totalIng)}</div><div class="kpi-sub">${ing.length} movimientos</div></div>
      <div class="kpi neg"><div class="kpi-label">↓ Egresos USD</div><div class="kpi-value">${fmt(totalEg)}</div><div class="kpi-sub">${eg.length} movimientos</div></div>
      <div class="kpi ${bal>=0?'bal-pos':'bal-neg'}"><div class="kpi-label">⚖ Balance USD</div><div class="kpi-value">${fmt(bal)}</div><div class="kpi-sub">${bal>=0?'Superávit':'Déficit'}</div></div>
      <div class="kpi"><div class="kpi-label">≡ Registros</div><div class="kpi-value">${rows.length}</div><div class="kpi-sub">de ${allRows.length} totales</div></div>
    </div>
    <div class="filter-card">
      <div class="filter-row">
        <div class="filter-group"><label>Año</label><select id="f-ano" multiple onchange="rerender()">${anos.map(a=>`<option value="${a}">${a}</option>`).join('')}</select>${hint}</div>
        <div class="filter-group"><label>Mes</label><select id="f-mes" multiple onchange="rerender()">${meses.map(m=>`<option value="${m}">${m}</option>`).join('')}</select>${hint}</div>
        <div class="filter-group"><label>Tipo mov.</label><select id="f-tipo" onchange="rerender()"><option value="">Todos</option><option>Ingreso</option><option>Egreso</option></select></div>
        <div class="filter-group"><label>Banco</label><select id="f-banco" multiple onchange="rerender()">${bancos.map(b=>`<option value="${b}">${b}</option>`).join('')}</select>${hint}</div>
        <div class="filter-group"><label>Categoría</label><select id="f-cat" multiple onchange="rerender()">${cats.map(c=>`<option value="${c}">${c}</option>`).join('')}</select>${hint}</div>
        <div class="filter-group"><label>Tipo</label><select id="f-subtipo" multiple onchange="rerender()">${tipos.map(t=>`<option value="${t}">${t}</option>`).join('')}</select>${hint}</div>
        <button class="clear-btn" onclick="clearFilters()">✕ Limpiar</button>
      </div>
    </div>
    <div class="tabs">
      <div class="tab active" onclick="showTab('resumen',this)">📊 Resumen</div>
      <div class="tab" onclick="showTab('movimientos',this)">📋 Movimientos</div>
      <div class="tab" onclick="showTab('ranking',this)">🏆 Ranking Beneficiarios</div>
    </div>
    <div id="tab-resumen" class="section active">
      <div class="charts-grid">
        <div class="chart-card"><div class="chart-title">Ingresos vs Egresos</div><canvas id="ch-pie" height="220"></canvas></div>
        <div class="chart-card"><div class="chart-title">Por mes (USD)</div><canvas id="ch-bar" height="220"></canvas></div>
        ${cats.length?`<div class="chart-card full"><div class="chart-title">Egresos por categoría</div><canvas id="ch-cat" height="120"></canvas></div>`:''}
      </div>
    </div>
    <div id="tab-movimientos" class="section">
      <div class="table-card">
        <div class="chart-title" style="margin-bottom:14px">Últimos 30 movimientos</div>
        <table><thead><tr><th>Fecha</th><th>Comentario</th><th>Banco</th><th>Categoría</th><th>Tipo</th><th>Mov.</th><th style="text-align:right">Monto USD</th></tr></thead>
        <tbody>${tbody}</tbody></table>
      </div>
    </div>
    <div id="tab-ranking" class="section">
      <div class="table-card">
        <div class="chart-title" style="margin-bottom:14px">Ranking ingresos por beneficiario</div>
        <table><thead><tr><th>#</th><th>Beneficiario</th><th>Transacciones</th><th style="text-align:right">Total USD</th><th>Proporción</th><th>Top meses</th></tr></thead>
        <tbody>${rankRows}</tbody></table>
      </div>
    </div>`;

  chartObjs.pie = new Chart($('ch-pie').getContext('2d'), {
    type:'doughnut',
    data:{ labels:['Ingresos','Egresos'], datasets:[{ data:[totalIng,totalEg], backgroundColor:['#1D9E75','#D85A30'], borderWidth:0 }] },
    options:{ plugins:{ legend:{ position:'bottom', labels:{ font:{size:12} } } }, cutout:'65%' }
  });

  const byM = {};
  rows.forEach(r => {
    const k = parseDate(r[C.fecha]); if (!k) return;
    if (!byM[k]) byM[k] = {i:0,e:0};
    if (isIngreso(r)) byM[k].i += getMonto(r); else byM[k].e += getMonto(r);
  });
  const ms = Object.keys(byM).sort();
  if (ms.length && $('ch-bar')) {
    chartObjs.bar = new Chart($('ch-bar').getContext('2d'), {
      type:'bar',
      data:{ labels:ms, datasets:[
        { label:'Ingresos', data:ms.map(m=>Math.round(byM[m].i)), backgroundColor:'#1D9E75' },
        { label:'Egresos',  data:ms.map(m=>Math.round(byM[m].e)), backgroundColor:'#D85A30' }
      ]},
      options:{ plugins:{ legend:{ labels:{ font:{size:11} } } }, scales:{ x:{ ticks:{ font:{size:9}, maxRotation:45 } }, y:{ ticks:{ font:{size:10}, callback:v=>'$'+Math.abs(v).toLocaleString() } } } }
    });
  }

  if (cats.length && $('ch-cat')) {
    const byCat = {};
    eg.forEach(r => { const cat=(r[C.cat]||'Sin categoría').trim(); byCat[cat]=(byCat[cat]||0)+getMonto(r); });
    const sorted = Object.keys(byCat).sort((a,b)=>byCat[b]-byCat[a]).slice(0,10);
    chartObjs.cat = new Chart($('ch-cat').getContext('2d'), {
      type:'bar',
      data:{ labels:sorted, datasets:[{ label:'Egresos USD', data:sorted.map(k=>Math.round(byCat[k])), backgroundColor:'#D85A30' }] },
      options:{ indexAxis:'y', plugins:{ legend:{display:false} }, scales:{ x:{ ticks:{ font:{size:10}, callback:v=>'$'+v.toLocaleString() } }, y:{ ticks:{ font:{size:10} } } } }
    });
  }
}

function showTab(id, el) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  $('tab-'+id).classList.add('active');
  el.classList.add('active');
}

function rerender() { render(applyFilters()); }

function clearFilters() {
  ['f-ano','f-mes','f-banco','f-cat','f-subtipo'].forEach(id => {
    const el=$(id); if(el) Array.from(el.options).forEach(o=>o.selected=false);
  });
  const ft=$('f-tipo'); if(ft) ft.value='';
  rerender();
}

function loadData() {
  $('err-box').style.display = 'none';
  $('meta-txt').textContent = 'Actualizando...';
  $('app').innerHTML = '<div class="loading"><span class="spinner"></span>Cargando datos...</div>';
  Papa.parse(CSV + '&nocache=' + Date.now(), {
    download:true, header:true, skipEmptyLines:true,
    complete(res) {
      if (!res.data || res.data.length === 0) {
        $('err-box').innerHTML = `<div class="err">Sin datos. Columnas: ${(res.meta.fields||[]).join(' | ')}</div>`;
        $('err-box').style.display = 'block'; $('app').innerHTML = ''; return;
      }
      allRows = res.data;
      C = mapCols(res.meta.fields || []);
      $('meta-txt').textContent = `Actualizado: ${new Date().toLocaleString('es-VE')} · ${allRows.length} registros`;
      render(allRows);
    },
    error(e) {
      $('err-box').innerHTML = `<div class="err">Error: ${e.message}</div>`;
      $('err-box').style.display = 'block'; $('app').innerHTML = '';
    }
  });
}

loadData();
</script>
</body>
</html>
