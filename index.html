<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finanzas 2026 — Inversiones Marines</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3348;--text:#e8eaf0;--muted:#7b82a0;--accent:#4f8ef7;--green:#34c87a;--red:#f05454;--amber:#f5a623;--green-bg:rgba(52,200,122,0.1);--red-bg:rgba(240,84,84,0.1);--accent-bg:rgba(79,142,247,0.1);}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1rem;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:200}
.logo{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0}
.topbar-right{display:flex;align-items:center;gap:10px}
.meta{font-size:11px;color:var(--muted);display:none}
@media(min-width:600px){.meta{display:block}}
.btn{background:var(--accent);color:#fff;border:none;padding:6px 14px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;transition:opacity .2s;white-space:nowrap}
.btn:hover{opacity:.85}
.burger{display:flex;flex-direction:column;gap:4px;cursor:pointer;padding:4px;background:none;border:none}
.burger span{width:18px;height:2px;background:var(--muted);border-radius:2px}
@media(min-width:900px){.burger{display:none}}
.layout{display:flex;min-height:calc(100vh - 52px);position:relative}
.sidebar{width:190px;background:var(--surface);border-right:1px solid var(--border);padding:1rem 0;flex-shrink:0;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto;transition:transform .25s;z-index:150}
@media(max-width:899px){.sidebar{position:fixed;top:52px;left:0;height:calc(100vh - 52px);transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}}
.overlay{display:none;position:fixed;inset:0;top:52px;background:rgba(0,0,0,.5);z-index:140}
.nav-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;padding:0 1.25rem;margin-bottom:6px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 1rem;border-radius:8px;cursor:pointer;color:var(--muted);font-size:13px;font-weight:500;transition:all .15s;margin:1px 0.5rem}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--accent-bg);color:var(--accent)}
.nav-item svg{width:15px;height:15px;flex-shrink:0}
.main{flex:1;padding:1rem;min-width:0;overflow-x:hidden}
@media(min-width:600px){.main{padding:1.25rem 1.5rem}}
.filterbar{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.875rem 1rem;margin-bottom:1rem}
.fb-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.fb-title{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
.clear-all{font-size:11px;color:var(--muted);cursor:pointer;background:none;border:none;font-family:inherit}
.clear-all:hover{color:var(--red)}
.filter-sections{display:flex;flex-direction:column;gap:10px}
.fs-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.chips{display:flex;flex-wrap:wrap;gap:4px}
.chip{padding:3px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap;font-family:inherit;line-height:1.4}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.chip.sel{background:var(--accent);border-color:var(--accent);color:#fff}
.chip.sel-g{background:var(--green);border-color:var(--green);color:#fff}
.chip.sel-r{background:var(--red);border-color:var(--red);color:#fff}
.chip.more{border-style:dashed}
.search-filter{position:relative}
.search-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 10px;color:var(--text);font-size:12px;font-family:inherit;outline:none}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--muted)}
.search-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface2);border:1px solid var(--border);border-radius:8px;max-height:160px;overflow-y:auto;z-index:50;display:none;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.search-dropdown.open{display:block}
.search-option{padding:7px 12px;font-size:12px;cursor:pointer;color:var(--text)}
.search-option:hover{background:var(--surface)}
.search-option.sel{color:var(--accent)}
.selected-pills{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.pill{background:var(--accent-bg);border:1px solid var(--accent);color:var(--accent);font-size:11px;padding:2px 8px;border-radius:20px;display:flex;align-items:center;gap:5px}
.pill-x{cursor:pointer;opacity:.7;font-size:13px;line-height:1}
.pill-x:hover{opacity:1}
.active-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);align-items:center}
.active-row-label{font-size:10px;color:var(--muted);font-weight:600;white-space:nowrap}
.atag{background:var(--accent-bg);border:1px solid var(--accent);color:var(--accent);font-size:11px;padding:2px 8px;border-radius:20px;display:flex;align-items:center;gap:5px}
.atag-x{cursor:pointer;opacity:.6;font-size:13px}
.atag-x:hover{opacity:1}
.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:1rem}
@media(min-width:700px){.kpi-grid{grid-template-columns:repeat(4,1fr)}}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi.pos::before{background:var(--green)}.kpi.neg::before{background:var(--red)}.kpi.bal::before{background:var(--accent)}.kpi.neu::before{background:var(--amber)}
.kpi-label{font-size:10px;color:var(--muted);font-weight:500;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.kpi-value{font-size:18px;font-weight:700}
@media(min-width:600px){.kpi-value{font-size:20px}}
.kpi.pos .kpi-value{color:var(--green)}.kpi.neg .kpi-value{color:var(--red)}.kpi.bal .kpi-value{color:var(--accent)}.kpi.neu .kpi-value{color:var(--amber)}
.kpi-sub{font-size:10px;color:var(--muted);margin-top:4px}
.page{display:none}.page.active{display:block}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem;margin-bottom:1rem}
.card-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.875rem}
.resumen-top{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:1rem}
@media(min-width:700px){.resumen-top{grid-template-columns:300px 1fr}}
.chart-wrap{position:relative;width:100%}
.charts-grid{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:1rem}
@media(min-width:700px){.charts-grid{grid-template-columns:1fr 1fr}}
.cat-section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cat-section-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.cat-section-total{font-size:15px;font-weight:700}
.cat-item{margin-bottom:2px;border-radius:8px;overflow:hidden;border:1px solid transparent;transition:border-color .15s}
.cat-item.open{border-color:var(--border)}
.cat-row{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;border-radius:8px;transition:background .15s;user-select:none}
.cat-row:hover{background:var(--surface2)}
.cat-item.open .cat-row{background:var(--surface2);border-radius:8px 8px 0 0}
.cat-chevron{font-size:10px;color:var(--muted);transition:transform .2s;flex-shrink:0;width:14px}
.cat-item.open .cat-chevron{transform:rotate(90deg)}
.cat-name{font-size:13px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-bar-wrap{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;max-width:200px}
@media(min-width:700px){.cat-bar-wrap{max-width:300px}}
.cat-bar-fill{height:6px;border-radius:3px;transition:width .4s ease}
.cat-pct{font-size:10px;color:var(--muted);white-space:nowrap;min-width:32px;text-align:right}
.cat-total{font-size:13px;font-weight:700;white-space:nowrap;min-width:90px;text-align:right}
.cat-detail{display:none;padding:8px 12px 12px 36px;background:var(--surface2);border-radius:0 0 8px 8px}
.cat-item.open .cat-detail{display:block}
.cat-detail-label{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.sub-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.sub-row:last-child{border-bottom:none}
.sub-name{font-size:12px;color:var(--muted);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sub-bar-wrap{width:100px;height:3px;background:var(--border);border-radius:2px;flex-shrink:0}
@media(min-width:600px){.sub-bar-wrap{width:140px}}
.sub-bar-fill{height:3px;border-radius:2px;opacity:.75}
.sub-pct{font-size:10px;color:var(--muted);min-width:28px;text-align:right;flex-shrink:0}
.sub-amt{font-size:12px;font-weight:600;min-width:80px;text-align:right;flex-shrink:0}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:12px}
@media(min-width:600px){table{font-size:13px}}
th{text-align:left;padding:8px 10px;color:var(--muted);font-weight:500;border-bottom:1px solid var(--border);font-size:10px;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap}
.b-ing{background:var(--green-bg);color:var(--green)}.b-eg{background:var(--red-bg);color:var(--red)}
.amt-ing{color:var(--green);font-weight:600}.amt-eg{color:var(--red);font-weight:600}
.rank-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.rank-row:last-child{border-bottom:none}
.rank-num{width:20px;font-size:11px;color:var(--muted);font-weight:600;flex-shrink:0;text-align:center}
.rank-name{flex:1;font-size:12px;font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rank-bar-wrap{width:80px;height:3px;background:var(--surface2);border-radius:2px;flex-shrink:0}
@media(min-width:600px){.rank-bar-wrap{width:120px}}
.rank-bar-fill{height:3px;border-radius:2px}
.rank-amt{min-width:80px;text-align:right;font-size:12px;font-weight:600;flex-shrink:0}
.rank-count{font-size:10px;color:var(--muted);width:45px;flex-shrink:0;text-align:right}
.loading{display:flex;align-items:center;justify-content:center;height:200px;color:var(--muted);gap:10px;font-size:13px}
.spin{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
/* ── COBRANZAS ── */
.cob-topbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:1rem}
.cob-sel{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 10px;color:var(--text);font-size:12px;font-family:inherit;outline:none;cursor:pointer}
.cob-sel:focus{border-color:var(--accent)}
.cob-search{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 10px;color:var(--text);font-size:12px;font-family:inherit;outline:none;width:180px}
.cob-search::placeholder{color:var(--muted)}
.cob-kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:1rem}
@media(min-width:700px){.cob-kpis{grid-template-columns:repeat(4,1fr)}}
.tab-btns{display:flex;gap:4px;margin-bottom:1rem;flex-wrap:wrap}
.tab-btn{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 14px;color:var(--muted);font-size:12px;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s}
.tab-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.cob-tbl th{background:var(--surface2)}
.cob-tbl td.c-paid{color:var(--green);font-weight:600}
.cob-tbl td.c-late{color:var(--amber);font-weight:600}
.cob-tbl td.c-no{color:var(--muted)}
.cob-tbl td.c-tot{font-weight:700;color:var(--text);background:rgba(255,255,255,0.03)}
.cob-tbl tfoot td{background:var(--surface2);font-weight:700;font-size:11px;color:var(--text);padding:8px 10px}
.pat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;margin-bottom:1rem}
.pat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px}
.pat-name{font-size:13px;font-weight:600;margin-bottom:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pat-dots{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.pd{width:22px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;cursor:default;flex-shrink:0}
.pd.paid{background:rgba(52,200,122,0.2);color:var(--green)}.pd.late{background:rgba(245,166,35,0.2);color:var(--amber)}.pd.no{background:rgba(240,84,84,0.15);color:var(--red)}.pd.fut{background:var(--surface2);color:var(--muted)}
.pat-stats{display:flex;gap:10px;font-size:11px;flex-wrap:wrap}
.pat-stat{text-align:center}.pat-stat .ps-val{font-weight:700;font-size:13px}.pat-stat .ps-lbl{color:var(--muted);margin-top:1px}
.prov-table td,.prov-table th{white-space:nowrap}
.prov-table tfoot td{background:var(--surface2);font-weight:700;color:var(--text)}
.rep-kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:1rem}
@media(min-width:600px){.rep-kpis{grid-template-columns:repeat(4,1fr)}}
.rep-header{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem;margin-bottom:1rem;text-align:center}
.rep-header h2{font-size:16px;font-weight:700;margin-bottom:4px}
.rep-header .rep-period{font-size:12px;color:var(--muted)}
@media print{.sidebar,.topbar,.tab-btns,.cob-topbar,.cob-kpis,.filterbar,.kpi-grid{display:none!important}.rep-print{display:block!important}.page{display:block!important}}

</style>
</head>
<body>
<div class="topbar">
  <div style="display:flex;align-items:center;gap:10px">
    <button class="burger" onclick="toggleSidebar()"><span></span><span></span><span></span></button>
    <div class="logo"><div class="logo-dot"></div>Inversiones Marines — Finanzas 2026</div>
  </div>
  <div class="topbar-right">
    <span class="meta" id="meta-txt">Cargando...</span>
    <button class="btn" onclick="loadData()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
      Actualizar
    </button>
  </div>
</div>
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>
<div class="layout">
  <nav class="sidebar" id="sidebar">
    <div style="padding:0 0.5rem;margin-bottom:0.5rem">
      <div class="nav-label" style="margin-bottom:10px">Principal</div>
      <div class="nav-item active" id="nav-resumen" onclick="showPage('resumen')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Resumen
      </div>
      <div class="nav-item" id="nav-movimientos" onclick="showPage('movimientos')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>Movimientos
      </div>
      <div class="nav-item" id="nav-ranking" onclick="showPage('ranking')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>Beneficiarios
      </div>
      <div class="nav-item" id="nav-categorias" onclick="showPage('categorias')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Categorías
      </div>
      <div style="margin:12px 1.25rem 4px;border-top:1px solid var(--border)"></div>
      <div class="nav-label" style="margin-top:8px">Inquilinos</div>
      <div class="nav-item" id="nav-cobranzas" onclick="showPage('cobranzas')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Cobranzas
      </div>
    </div>
  </nav>
  <div class="main">
    <div class="filterbar" id="filterbar"></div>
    <div class="kpi-grid" id="kpi-grid"></div>
    <div id="page-resumen" class="page active"></div>
    <div id="page-movimientos" class="page"></div>
    <div id="page-ranking" class="page"></div>
    <div id="page-categorias" class="page"></div>
    <div id="page-cobranzas" class="page"></div>
  </div>
</div>
<script>
const CSV='https://docs.google.com/spreadsheets/d/e/2PACX-1vRiMekDVhvEC1crwqEsgKj-S9FX9rkMhuzrQ84C-8SCo-qFD2oi6943XF6l6PUVzGLsVhyJVUSMztHa/pub?gid=1817920401&single=true&output=csv';
let allRows=[],C={},charts={};
let currentPage='resumen';
let F={tipoMov:'',anos:[],meses:[],bancos:[],cats:[],tipos:[],benefSel:[],duenos:[],inmRefs:[]};
const $=id=>document.getElementById(id);
const esc=s=>String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function fmt(n){return'$'+new Intl.NumberFormat('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}).format(Math.abs(n||0));}
function parseNum(v){if(!v&&v!==0)return 0;let s=String(v).trim().replace(/[^0-9.,\-]/g,'');if(!s||s==='-')return 0;if(/,\d{1,2}$/.test(s)&&s.includes('.')){s=s.replace(/\./g,'').replace(',','.');}else if(/,\d{1,2}$/.test(s)){s=s.replace(',','.');}else{s=s.replace(/,/g,'');}const n=parseFloat(s);return isNaN(n)?0:n;}
function parseYM(v){if(!v)return null;const s=String(v).trim();if(/^\d{4}-\d{2}-\d{2}/.test(s))return s.substring(0,7);const dmy=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);if(dmy)return`${dmy[3]}-${String(parseInt(dmy[2])).padStart(2,'0')}`;const dm=s.match(/^(\d{1,2})[\/\-]([A-Za-z]{3})[\/\-](\d{2,4})/i);if(dm){const mo={jan:'01',feb:'02',mar:'03',apr:'04',may:'05',jun:'06',jul:'07',aug:'08',sep:'09',oct:'10',nov:'11',dec:'12'}[dm[2].toLowerCase()]||'01';const y=dm[3].length===2?'20'+dm[3]:dm[3];return`${y}-${mo}`;}return null;}
function mlabel(ym){if(!ym)return'';const[y,m]=ym.split('-');return['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][parseInt(m)-1]+' '+y;}
function mapCols(fields){const find=(...terms)=>fields.find(f=>terms.some(t=>f.toLowerCase().replace(/[\s\/\-_áéíóúü]/g,'').includes(t.toLowerCase().replace(/[\s\/\-_áéíóúü]/g,''))))||null;return{fecha:find('FECHA'),ingEg:find('INGRESOEGRESO','INGRESO'),banco:find('BANCO'),tipo:find('TIPO'),cat:find('CATEGORIA','CATEGORÍA'),coment:find('COMENTARIOS'),benef:find('BENEFICIARIO'),dueno:find('DUEÑOINMUEBLE','DUEÑO','DUENO'),inmRef:find('INMUEBLEREF','INMUEBLE'),credito:find('CREDITO','CRÉDITO'),debito:find('DEBITO','DÉBITO'),montoUSD:find('MONTOUSD'),mLimpio:find('MOntoLimpio','MONTOLIMPIO','Monto_Limpio')};}
function isIng(row){const v=String(row[C.ingEg]||'').toLowerCase().trim();return v.includes('ingr')||v.includes('entr')||v.includes('abono')||v==='i';}
function getMonto(row){if(C.montoUSD){const v=parseNum(row[C.montoUSD]);if(v!==0)return Math.abs(v);}if(C.mLimpio){const v=parseNum(row[C.mLimpio]);if(v!==0)return Math.abs(v);}if(isIng(row)&&C.credito){const v=parseNum(row[C.credito]);if(v!==0)return Math.abs(v);}if(!isIng(row)&&C.debito){const v=parseNum(row[C.debito]);if(v!==0)return Math.abs(v);}return 0;}
function getBenef(row){return(row[C.benef]||'').trim();}
function getDueno(row){return(row[C.dueno]||'').trim();}
function getInmRef(row){return(row[C.inmRef]||'').trim();}
function killCharts(){Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}});charts={};}
function applyFilters(){return allRows.filter(r=>{const ym=parseYM(r[C.fecha]);if(F.anos.length&&!F.anos.includes(ym?ym.substring(0,4):''))return false;if(F.meses.length&&!F.meses.includes(ym?ym.substring(5,7):''))return false;if(F.tipoMov==='Ingreso'&&!isIng(r))return false;if(F.tipoMov==='Egreso'&&isIng(r))return false;if(F.bancos.length&&!F.bancos.includes((r[C.banco]||'').trim()))return false;if(F.cats.length&&!F.cats.includes((r[C.cat]||'').trim()))return false;if(F.tipos.length&&!F.tipos.includes((r[C.tipo]||'').trim()))return false;if(F.benefSel.length&&!F.benefSel.includes(getBenef(r)))return false;if(F.duenos.length&&!F.duenos.includes(getDueno(r)))return false;if(F.inmRefs.length&&!F.inmRefs.includes(getInmRef(r)))return false;return true;});}

function buildCatBreakdown(rows,ingMode){
  const filtered=ingMode?rows.filter(r=>isIng(r)):rows.filter(r=>!isIng(r));
  const total=filtered.reduce((s,r)=>s+getMonto(r),0);
  if(!filtered.length)return'<div style="color:var(--muted);font-size:13px;padding:.5rem 0">Sin datos para el filtro seleccionado.</div>';
  const catMap={};
  filtered.forEach(r=>{
    const cat=(r[C.cat]||'Sin categoría').trim();
    const tipo=(r[C.tipo]||'').trim();
    const benef=getBenef(r)||'Sin beneficiario';
    const m=getMonto(r);
    if(!catMap[cat])catMap[cat]={total:0,tipos:{},benefs:{}};
    catMap[cat].total+=m;
    if(tipo)catMap[cat].tipos[tipo]=(catMap[cat].tipos[tipo]||0)+m;
    catMap[cat].benefs[benef]=(catMap[cat].benefs[benef]||0)+m;
  });
  const sortedCats=Object.entries(catMap).sort((a,b)=>b[1].total-a[1].total);
  const maxCat=sortedCats[0]?.[1]?.total||1;
  const color=ingMode?'var(--green)':'var(--red)';
  const colorHex=ingMode?'#34c87a':'#f05454';
  const prefix=ingMode?'ing':'eg';
  const header=`<div class="cat-section-header"><div class="cat-section-title">${ingMode?'Ingresos':'Egresos'} por categoría</div><div class="cat-section-total" style="color:${color}">${fmt(total)}</div></div>`;
  const items=sortedCats.map(([cat,d],idx)=>{
    const pct=Math.round(d.total/total*100);const barW=Math.round(d.total/maxCat*100);
    const id=`cat-${prefix}-${idx}`;
    const tipoEntries=Object.entries(d.tipos).sort((a,b)=>b[1]-a[1]);
    const useTipo=tipoEntries.length>=2;
    const subEntries=useTipo?tipoEntries:Object.entries(d.benefs).sort((a,b)=>b[1]-a[1]);
    const subLabel=useTipo?'Por tipo':'Por beneficiario';
    const maxSub=subEntries[0]?.[1]||1;
    const subRows=subEntries.map(([name,amt])=>{const spct=Math.round(amt/d.total*100);const sbarW=Math.round(amt/maxSub*100);return`<div class="sub-row"><div class="sub-name">${esc(name)}</div><div class="sub-bar-wrap"><div class="sub-bar-fill" style="width:${sbarW}%;background:${colorHex}"></div></div><div class="sub-pct">${spct}%</div><div class="sub-amt" style="color:${color}">${fmt(amt)}</div></div>`;}).join('');
    return`<div class="cat-item" id="${id}"><div class="cat-row" onclick="toggleCat('${id}')"><span class="cat-chevron">▶</span><div class="cat-name">${esc(cat)}</div><div class="cat-bar-wrap"><div class="cat-bar-fill" style="width:${barW}%;background:${colorHex}"></div></div><div class="cat-pct">${pct}%</div><div class="cat-total" style="color:${color}">${fmt(d.total)}</div></div><div class="cat-detail"><div class="cat-detail-label">${subLabel}</div>${subRows}</div></div>`;
  }).join('');
  return header+items;
}

function buildFilters(){

  const bancoCounts={};allRows.forEach(r=>{const b=(r[C.banco]||'').trim();if(b)bancoCounts[b]=(bancoCounts[b]||0)+1;});

  const topBancos=allBancos.slice(0,6);const moreBancos=allBancos.slice(6);
  const tipoCounts={};allRows.forEach(r=>{const t=(r[C.tipo]||'').trim();if(t)tipoCounts[t]=(tipoCounts[t]||0)+1;});
  const allTipos=Object.keys(tipoCounts).sort((a,b)=>tipoCounts[b]-tipoCounts[a]);
  const topTipos=allTipos.slice(0,6);const moreTipos=allTipos.slice(6);
  const cats=[...new Set(allRows.map(r=>(r[C.cat]||'').trim()).filter(Boolean))].sort();
  const allBenefs=[...new Set(allRows.map(r=>getBenef(r)).filter(Boolean))].sort();
  const duenoCounts={};allRows.forEach(r=>{const d=getDueno(r);if(d)duenoCounts[d]=(duenoCounts[d]||0)+1;});
  const allDuenos=Object.keys(duenoCounts).sort((a,b)=>duenoCounts[b]-duenoCounts[a]);
  const topDuenos=allDuenos.slice(0,5);const moreDuenos=allDuenos.slice(5);
  const inmCounts={};allRows.forEach(r=>{const i=getInmRef(r);if(i)inmCounts[i]=(inmCounts[i]||0)+1;});
  const allInmRefs=Object.keys(inmCounts).sort((a,b)=>inmCounts[b]-inmCounts[a]);
  const topInmRefs=allInmRefs.slice(0,5);const moreInmRefs=allInmRefs.slice(5);
  const tags=[];
  if(F.tipoMov)tags.push({l:F.tipoMov,rm:()=>{F.tipoMov='';rerender();}});
  F.anos.forEach(a=>tags.push({l:'Año: '+a,rm:()=>{F.anos=F.anos.filter(x=>x!==a);rerender();}}));
  F.meses.forEach(m=>{const nm=mesNames.find(x=>x.startsWith(m+':'));tags.push({l:'Mes: '+(nm?nm.split(':')[1]:m),rm:()=>{F.meses=F.meses.filter(x=>x!==m);rerender();}});});
  F.bancos.forEach(b=>tags.push({l:'Banco: '+b,rm:()=>{F.bancos=F.bancos.filter(x=>x!==b);rerender();}}));
  F.cats.forEach(c=>tags.push({l:'Cat: '+c,rm:()=>{F.cats=F.cats.filter(x=>x!==c);rerender();}}));
  F.tipos.forEach(t=>tags.push({l:'Tipo: '+t,rm:()=>{F.tipos=F.tipos.filter(x=>x!==t);rerender();}}));
  F.benefSel.forEach(b=>tags.push({l:'Benef: '+b,rm:()=>{F.benefSel=F.benefSel.filter(x=>x!==b);rerender();}}));
  F.duenos.forEach(d=>tags.push({l:'Dueño: '+d,rm:()=>{F.duenos=F.duenos.filter(x=>x!==d);rerender();}}));
  F.inmRefs.forEach(i=>tags.push({l:'Inm: '+i,rm:()=>{F.inmRefs=F.inmRefs.filter(x=>x!==i);rerender();}}));
  window._rmFns=tags.map(t=>t.rm);
  const chipRow=(arr,selArr,field)=>arr.map(v=>`<button class="chip${selArr.includes(v)?' sel':''}" onclick="toggleF('${field}','${esc(v)}')">${esc(v)}</button>`).join('');
  const moreDD=(items,selArr,field,id)=>!items.length?'':
    `<div style="position:relative;display:inline-block"><button class="chip more" onclick="toggleDD('${id}')" id="btn-${id}">+${items.length} más ▾</button><div id="${id}" style="display:none;position:absolute;top:calc(100% + 4px);left:0;background:var(--surface2);border:1px solid var(--border);border-radius:8px;min-width:160px;max-height:180px;overflow-y:auto;z-index:60;box-shadow:0 8px 24px rgba(0,0,0,.4)">${items.map(v=>`<div class="search-option${selArr.includes(v)?' sel':''}" onclick="toggleF('${field}','${esc(v)}')">${esc(v)}</div>`).join('')}</div></div>`;
  const searchDD=(allItems,selArr,inputId,dropId,toggleFn)=>`<div class="search-filter"><input class="search-input" id="${inputId}" placeholder="Buscar..." oninput="filterSearchList('${inputId}','${dropId}')" onfocus="openDrop('${dropId}')" autocomplete="off"><div class="search-dropdown" id="${dropId}">${allItems.map(b=>`<div class="search-option${selArr.includes(b)?' sel':''}" onclick="${toggleFn}('${esc(b)}')">${esc(b)}</div>`).join('')}</div></div><div class="selected-pills">${selArr.map(b=>`<div class="pill">${esc(b)}<span class="pill-x" onclick="${toggleFn}('${esc(b)}')">×</span></div>`).join('')}</div>`;
  $('filterbar').innerHTML=`
    <div class="fb-top"><div class="fb-title">Filtros</div>${tags.length?`<button class="clear-all" onclick="clearAll()">Limpiar todo</button>`:''}</div>
    <div class="filter-sections">
      <div><div class="fs-label">Tipo movimiento</div><div class="chips"><button class="chip${F.tipoMov===''?' sel':''}" onclick="F.tipoMov='';rerender()">Todos</button><button class="chip${F.tipoMov==='Ingreso'?' sel-g sel':''}" onclick="F.tipoMov='Ingreso';rerender()">Ingresos</button><button class="chip${F.tipoMov==='Egreso'?' sel-r sel':''}" onclick="F.tipoMov='Egreso';rerender()">Egresos</button></div></div>
      <div><div class="fs-label">Año</div><div class="chips">${chipRow(anos,F.anos,'anos')}</div></div>
      <div><div class="fs-label">Mes</div><div class="chips">${availM.map(x=>{const[num,nom]=x.split(':');return`<button class="chip${F.meses.includes(num)?' sel':''}" onclick="toggleF('meses','${num}')">${nom}</button>`;}).join('')}</div></div>
      <div><div class="fs-label">Banco <span style="font-weight:400;color:var(--muted)">(frecuentes)</span></div><div class="chips">${chipRow(topBancos,F.bancos,'bancos')}${moreDD(moreBancos,F.bancos,'bancos','dd-bancos')}</div></div>
      <div><div class="fs-label">Categoría</div><div class="chips">${chipRow(cats,F.cats,'cats')}</div></div>
      <div><div class="fs-label">Tipo <span style="font-weight:400;color:var(--muted)">(frecuentes)</span></div><div class="chips">${chipRow(topTipos,F.tipos,'tipos')}${moreDD(moreTipos,F.tipos,'tipos','dd-tipos')}</div></div>
      <div><div class="fs-label">Beneficiario</div>${searchDD(allBenefs,F.benefSel,'benef-input','benef-drop','toggleBenef')}</div>
      <div><div class="fs-label">Dueño Inmueble</div><div class="chips">${chipRow(topDuenos,F.duenos,'duenos')}${moreDD(moreDuenos,F.duenos,'duenos','dd-duenos')}</div></div>

    </div>
    ${tags.length?`<div class="active-row"><span class="active-row-label">Activos:</span>${tags.map((t,i)=>`<div class="atag">${esc(t.l)}<span class="atag-x" onclick="_rmFns[${i}]()">×</span></div>`).join('')}</div>`:''}`;
  document.onclick=e=>{['dd-bancos','dd-tipos','dd-duenos','dd-inmrefs'].forEach(id=>{const el=$(id);if(el&&el.style.display!=='none'&&!el.contains(e.target)&&!e.target.closest('#btn-'+id))el.style.display='none';});['benef-drop'].forEach(id=>{const dd=$(id);if(dd&&dd.classList.contains('open')&&!dd.contains(e.target)&&e.target.id!==id.replace('-drop','-input'))dd.classList.remove('open');});};
}

function toggleDD(id){const el=$(id);if(el)el.style.display=el.style.display==='none'?'block':'none';}
function toggleF(field,val){const arr=F[field];const i=arr.indexOf(val);if(i>=0)arr.splice(i,1);else arr.push(val);rerender();}
function filterSearchList(inputId,dropId){const q=($(inputId)?.value||'').toLowerCase();const dd=$(dropId);if(!dd)return;dd.querySelectorAll('.search-option').forEach(el=>{el.style.display=el.textContent.toLowerCase().includes(q)?'':'none';});dd.classList.add('open');}
function openDrop(id){const dd=$(id);if(dd)dd.classList.add('open');}
function toggleBenef(val){const i=F.benefSel.indexOf(val);if(i>=0)F.benefSel.splice(i,1);else F.benefSel.push(val);rerender();}
function clearAll(){F={tipoMov:'',anos:[],meses:[],bancos:[],cats:[],tipos:[],benefSel:[],duenos:[],inmRefs:[]};rerender();}

function buildKPI(rows){
  const ing=rows.filter(r=>isIng(r));const eg=rows.filter(r=>!isIng(r));
  const tI=ing.reduce((s,r)=>s+getMonto(r),0);const tE=eg.reduce((s,r)=>s+getMonto(r),0);const bal=tI-tE;
  $('kpi-grid').innerHTML=`<div class="kpi pos"><div class="kpi-label">Ingresos</div><div class="kpi-value">${fmt(tI)}</div><div class="kpi-sub">${ing.length} mov.</div></div><div class="kpi neg"><div class="kpi-label">Egresos</div><div class="kpi-value">${fmt(tE)}</div><div class="kpi-sub">${eg.length} mov.</div></div><div class="kpi bal"><div class="kpi-label">Balance</div><div class="kpi-value">${fmt(bal)}</div><div class="kpi-sub">${bal>=0?'Superávit':'Déficit'}</div></div><div class="kpi neu"><div class="kpi-label">Registros</div><div class="kpi-value">${rows.length}</div><div class="kpi-sub">de ${allRows.length} total</div></div>`;
  return{tI,tE,bal,ing,eg};
}

function buildRanking(rows){
  const ing=rows.filter(r=>isIng(r));const eg=rows.filter(r=>!isIng(r));
  const rankI={};ing.forEach(r=>{const b=getBenef(r)||getDueno(r)||'Sin benef.';if(!rankI[b])rankI[b]={t:0,c:0};rankI[b].t+=getMonto(r);rankI[b].c++;});
  const listI=Object.entries(rankI).sort((a,b)=>b[1].t-a[1].t);const maxI=listI[0]?.[1]?.t||1;
  const rankE={};eg.forEach(r=>{const b=getBenef(r)||getDueno(r)||(r[C.cat]||'').trim()||'Sin benef.';if(!rankE[b])rankE[b]={t:0,c:0};rankE[b].t+=getMonto(r);rankE[b].c++;});
  const listE=Object.entries(rankE).sort((a,b)=>b[1].t-a[1].t);const maxE=listE[0]?.[1]?.t||1;
  const rBlock=(list,max,color)=>list.slice(0,20).map(([name,d],i)=>`<div class="rank-row"><div class="rank-num">${i+1}</div><div class="rank-name" title="${esc(name)}">${esc(name)}</div><div class="rank-count">${d.c} mov.</div><div class="rank-bar-wrap"><div class="rank-bar-fill" style="width:${Math.round(d.t/max*100)}%;background:${color}"></div></div><div class="rank-amt" style="color:${color}">${fmt(d.t)}</div></div>`).join('');
  $('page-ranking').innerHTML=`<div class="charts-grid"><div class="card"><div class="card-title">Top ingresos por beneficiario</div>${rBlock(listI,maxI,'var(--green)')}</div><div class="card"><div class="card-title">Top egresos por beneficiario</div>${rBlock(listE,maxE,'var(--red)')}</div></div>`;
}

function buildCategorias(rows){
  const eg=rows.filter(r=>!isIng(r));

const CSV_COB='https://docs.google.com/spreadsheets/d/e/2PACX-1vRiMekDVhvEC1crwqEsgKj-S9FX9rkMhuzrQ84C-8SCo-qFD2oi6943XF6l6PUVzGLsVhyJVUSMztHa/pub?gid=1648764460&single=true&output=csv';
const N_SOCIOS=5;
let cobRows=[],cobLoaded=false,cobTab='tabla',cobMesFilt='',cobInqFilt='',cobRepInq='',cobRepChart=null,cobMetaChart=null,cobDeudaChart=null;
const ML=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
function mesLbl(ym){if(!ym)return'';const[,m]=ym.split('-');return ML[parseInt(m)-1]||ym;}
function mesLblFull(ym){if(!ym)return'';const[y,m]=ym.split('-');return ML[parseInt(m)-1]+' '+y;}
function cobN(v){
  let s=String(v||'').trim();
  if(!s||s==='-'||s==='')return 0;
  // Remove currency symbols, spaces, $ signs
  s=s.replace(/[$\s]/g,'');
  // Detect format: if has dot AND comma, figure out which is decimal
  // European: 2.490,00 → thousands=dot, decimal=comma
  // US: 2,490.00 → thousands=comma, decimal=dot
  if(s.includes(',')&&s.includes('.')){
    const lastDot=s.lastIndexOf('.');
    const lastComma=s.lastIndexOf(',');
    if(lastComma>lastDot){
      // European format: 2.490,00
      s=s.replace(/\./g,'').replace(',','.');
    } else {
      // US format: 2,490.00
      s=s.replace(/,/g,'');
    }
  } else if(s.includes(',')&&!s.includes('.')){
    // Could be decimal comma (1,5) or thousands (1,500)
    const parts=s.split(',');
    if(parts.length===2&&parts[1].length<=2){
      s=s.replace(',','.');  // decimal comma
    } else {
      s=s.replace(/,/g,'');  // thousands comma
    }
  }
  // Remove any remaining non-numeric except dot and minus
  s=s.replace(/[^0-9.\-]/g,'');
  const n=parseFloat(s);
  return isNaN(n)?0:n;
}
function killCobCharts(){[cobRepChart,cobMetaChart,cobDeudaChart].forEach(c=>{try{if(c)c.destroy();}catch(e){}});cobRepChart=cobMetaChart=cobDeudaChart=null;}

function loadCobData(cb){
  if(cobLoaded){cb();return;}

  });
}

function parseTenants(yearFilter){
  const tenants={};const mesSet=new Set();
  cobRows.forEach(r=>{
    const ano=String(r['ANO']||'').trim();
    if(yearFilter&&ano!==String(yearFilter))return;
    const inq=(r['Inquilinos']||'').trim();
    if(!inq||inq.startsWith('Desocupado'))return;
    const mesRaw=r['MES']||'';
    const d=new Date(mesRaw);if(isNaN(d))return;
    const mes=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    mesSet.add(mes);
    const pago=(r[' Pagó?']||r['Pagó?']||'').trim();
    const monto=Math.abs(cobN(r['Monto $']));
    const balance=cobN(r['Balance']);
    const canon=Math.abs(cobN(r['Canon Vigente']));
    const bat=Math.abs(cobN(r['Baticueva 20%']));
    const ga=Math.abs(cobN(r['G&A 60% ($)']));
    const op=Math.abs(cobN(r['Op, & Mantenimiento 20% ($)']));
    const comSocios=Math.abs(cobN(r['Comision Socios C/U $']));
    const prov=Math.abs(cobN(r['Provision Reserva $']));
    if(!tenants[inq])tenants[inq]={};
    tenants[inq][mes]={pago,monto,balance,canon,bat,ga,op,comSocios,prov};
  });
  return{tenants,meses:[...mesSet].sort()};
}

          <div class="pat-stat"><div class="ps-val" style="color:var(--red)">${np}</div><div class="ps-lbl">No pagó</div></div>
          <div class="pat-stat"><div class="ps-val">${fmt(totP)}</div><div class="ps-lbl">Cobrado</div></div>
          <div class="pat-stat"><div class="ps-val" style="color:${lastBal<0?'var(--red)':'var(--green)'}">${fmt(lastBal)}</div><div class="ps-lbl">Balance</div></div>
        </div>
      </div>`;
    }).join('');
    html+=`<div class="pat-grid">${cards||'<div style="color:var(--muted)">Sin datos</div>'}</div>`;
  }

  // ── TAB: PROVISIONES ──
  else if(cobTab==='provisiones'){
    const thM=kpiMeses.map(m=>`<th style="text-align:right">${mesLblFull(m)}</th>`).join('');
    function pRow(label,key,color){
      const cells=kpiMeses.map(m=>{const t=shownInqs.reduce((s,i)=>s+((tenants[i][m]||{})[key]||0),0);return`<td style="text-align:right;color:${color}">${t>0?'$'+Math.round(t).toLocaleString():'—'}</td>`;}).join('');
      const tot=kpiMeses.reduce((s,m)=>s+shownInqs.reduce((ss,i)=>ss+((tenants[i][m]||{})[key]||0),0),0);
      return`<tr><td style="font-weight:500">${label}</td>${cells}<td style="text-align:right;font-weight:700;color:${color}">${tot>0?'$'+Math.round(tot).toLocaleString():'—'}</td></tr>`;
    }
    const cobCells=kpiMeses.map(m=>{const t=shownInqs.reduce((s,i)=>s+((tenants[i][m]||{}).monto||0),0);return`<td style="text-align:right;color:var(--green)">${t>0?'$'+Math.round(t).toLocaleString():'—'}</td>`;}).join('');
    const cobTot=kpiMeses.reduce((s,m)=>s+shownInqs.reduce((ss,i)=>ss+((tenants[i][m]||{}).monto||0),0),0);
    const provCells=kpiMeses.map(m=>{const t=shownInqs.reduce((s,i)=>s+((tenants[i][m]||{}).bat||0)+((tenants[i][m]||{}).ga||0)+((tenants[i][m]||{}).op||0),0);return`<td style="text-align:right;font-weight:700;color:var(--accent)">${t>0?'$'+Math.round(t).toLocaleString():'—'}</td>`;}).join('');
    const provTot=kpiMeses.reduce((s,m)=>s+shownInqs.reduce((ss,i)=>ss+((tenants[i][m]||{}).bat||0)+((tenants[i][m]||{}).ga||0)+((tenants[i][m]||{}).op||0),0),0);
    html+=`<div class="card" style="padding:0"><div class="tbl-wrap"><table class="prov-table">
      <thead><tr><th>Concepto</th>${thM}<th style="text-align:right">Total</th></tr></thead>
      <tbody>
        <tr><td style="font-weight:600;color:var(--green)">💵 Cobrado del mes</td>${cobCells}<td style="text-align:right;font-weight:700;color:var(--green)">${fmt(cobTot)}</td></tr>
        ${pRow('🏛 Baticueva 20%','bat','#a78bfa')}
        ${pRow('🤝 G&A 60% (base socios)','ga','var(--accent)')}
        ${pRow('🔧 Op & Mantenimiento 20%','op','var(--amber)')}
        <tr style="background:rgba(255,255,255,0.03)"><td style="font-weight:700">📦 PROVISIÓN TOTAL</td>${provCells}<td style="text-align:right;font-weight:700;color:var(--accent)">${fmt(provTot)}</td></tr>
        ${pRow('💰 Div. Socios registrado','ga','var(--green)')}
      </tbody>
      <tfoot><tr><td>Mesada estimada c/u (${N_SOCIOS} socios)</td>${kpiMeses.map(m=>{const t=shownInqs.reduce((s,i)=>s+((tenants[i][m]||{}).ga||0),0);return`<td style="text-align:right;color:var(--green)">${t>0?'$'+Math.round(t/N_SOCIOS).toLocaleString():'—'}</td>`;}).join('')}<td style="text-align:right;color:var(--green);font-weight:700">$${Math.round(totGa/N_SOCIOS).toLocaleString()}</td></tr></tfoot>
    </table></div></div>`;
  }

  // ── TAB: REPORTE INQUILINO ──
  else if(cobTab==='reporte'){
    // Build full history across all years for selected tenant
    const{tenants:allT,meses:allM}=parseTenants(null);
    const inqOpts=Object.keys(allT).sort().map(i=>`<option value="${esc(i)}"${cobRepInq===i?'selected':''}>${esc(i)}</option>`).join('');
    html+=`<div class="cob-topbar" style="margin-bottom:1rem">
      <select class="cob-sel" style="min-width:280px" onchange="cobRepInq=this.value;killCobCharts();renderCobView()">
        <option value="">— Seleccionar inquilino —</option>${inqOpts}
      </select>
      ${cobRepInq?`<button class="btn" style="font-size:11px;padding:5px 12px" onclick="window.print()">🖨 Imprimir / PDF</button>`:''}
    </div>`;

    if(!cobRepInq){html+=`<div class="card" style="text-align:center;color:var(--muted);padding:3rem">Selecciona un inquilino para ver su reporte</div>`;
    } else {
      const tData=allT[cobRepInq]||{};
      const tMeses=Object.keys(tData).sort().filter(m=>tData[m]&&(tData[m].canon>0||tData[m].monto>0));
      if(!tMeses.length){html+=`<div class="card" style="color:var(--muted)">Sin datos para este inquilino.</div>`;
      } else {
        const lastD=tData[tMeses[tMeses.length-1]]||{};
        const totCobR=tMeses.reduce((s,m)=>s+(tData[m]?.monto||0),0);
        const balActual=lastD.balance||0;
        const canonActual=lastD.canon||0;
        const mesesAtraso=canonActual>0&&balActual<0?Math.round(Math.abs(balActual)/canonActual*10)/10:0;
        const periodoLabel=`${mesLblFull(tMeses[0])} hasta ${mesLblFull(tMeses[tMeses.length-1])}`;
        const pagados=tMeses.filter(m=>{const st=(tData[m]||{}).pago||'';return st==='Si'||st.includes('Adelantado');}).length;
        const atrasM=tMeses.filter(m=>(tData[m]||{}).pago?.includes('Atrasado')).length;
        const noPagM=tMeses.filter(m=>(tData[m]||{}).pago==='No').length;
        const montos=tMeses.map(m=>tData[m]?.monto||0);
        const balances=tMeses.map(m=>tData[m]?.balance||0);
        const canones=tMeses.map(m=>tData[m]?.canon||0);
        html+=`
        <div class="rep-header">
          <div style="font-size:11px;color:var(--muted);margin-bottom:4px">Fecha de Reporte: ${periodoLabel}</div>
          <h2>Reporte de Cobranzas Vs Balance</h2>
          <div style="font-size:15px;font-weight:600;color:var(--accent);margin-top:4px">${esc(cobRepInq)}</div>
        </div>
        <div class="rep-kpis">
          <div class="kpi pos"><div class="kpi-label">Total período cobrado</div><div class="kpi-value">${fmt(totCobR)}</div><div class="kpi-sub">${pagados} meses pagados</div></div>
          <div class="kpi neg"><div class="kpi-label">Balance actual</div><div class="kpi-value" style="color:${balActual<0?'var(--red)':balActual>0?'var(--green)':'var(--muted)'}">${fmt(balActual)}</div><div class="kpi-sub">${balActual<0?'Debe':'Al día'}</div></div>
          <div class="kpi neu"><div class="kpi-label">Meses de retraso</div><div class="kpi-value" style="color:${mesesAtraso>3?'var(--red)':mesesAtraso>0?'var(--amber)':'var(--green)'}">${mesesAtraso}</div><div class="kpi-sub">${atrasM} meses atrasado</div></div>
          <div class="kpi bal"><div class="kpi-label">Canon vigente</div><div class="kpi-value">${fmt(canonActual)}</div><div class="kpi-sub">${noPagM} meses sin pagar</div></div>
        </div>
        <div class="card">
          <div class="card-title">Pagos vs Balance acumulado — ${esc(cobRepInq)}</div>
          <div class="chart-wrap"><canvas id="ch-rep" style="max-height:280px"></canvas></div>
        </div>
        <div class="card"><div class="card-title">Detalle mes a mes</div>
        <div class="tbl-wrap"><table><thead><tr><th>Mes</th><th style="text-align:right">Canon</th><th style="text-align:right">Pagado</th><th style="text-align:right">Balance</th><th>Estado</th></tr></thead>
        <tbody>${tMeses.map(m=>{
          const d=tData[m]||{};const st=d.pago||'';
          const stBadge=st.includes('Atrasado')?`<span style="color:var(--amber);font-weight:600">⚠ Atrasado</span>`:st==='Si'||st.includes('Adelantado')?`<span style="color:var(--green);font-weight:600">✓ ${st}</span>`:`<span style="color:var(--red)">✗ No pagó</span>`;
          return`<tr><td>${mesLblFull(m)}</td><td style="text-align:right">${d.canon>0?fmt(d.canon):'—'}</td><td style="text-align:right;color:var(--green);font-weight:600">${d.monto>0?fmt(d.monto):'—'}</td><td style="text-align:right;color:${(d.balance||0)<0?'var(--red)':'var(--green)'}; font-weight:600">${fmt(d.balance||0)}</td><td>${stBadge}</td></tr>`;
        }).join('')}</tbody></table></div></div>`;

        setTimeout(()=>{
          const ctx=$('ch-rep');if(!ctx)return;
          cobRepChart=new Chart(ctx.getContext('2d'),{
            type:'bar',
            data:{labels:tMeses.map(m=>mesLblFull(m)),datasets:[
              {label:'Cobrado',data:montos,backgroundColor:'rgba(79,142,247,0.75)',borderRadius:4},
              {label:'Balance',data:balances,type:'line',borderColor:'#f5a623',backgroundColor:'transparent',borderWidth:2.5,pointRadius:5,pointBackgroundColor:'#f5a623',tension:0.3,yAxisID:'y'}
            ]},
            options:{responsive:true,maintainAspectRatio:false,
              plugins:{legend:{position:'top',labels:{color:tc,font:{size:11},padding:12,boxWidth:12}},
                tooltip:{callbacks:{label:ctx=>` ${ctx.dataset.label}: ${fmt(ctx.raw)}`}}},
              scales:{
                x:{ticks:{color:tc,font:{size:10},maxRotation:45},grid:{color:gc}},
                y:{ticks:{color:tc,font:{size:10},callback:v=>'$'+v.toLocaleString()},grid:{color:gc}}
              }
            }
          });
        },100);
      }
    }
  }

  $('page-cobranzas').innerHTML=html;
  // Re-trigger chart renders after DOM update for non-setTimeout tabs
}

loadData();
</script>
</body>
</html>
