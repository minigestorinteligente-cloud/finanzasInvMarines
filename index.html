<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finanzas 2026 — Inversiones Marines</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3348;--text:#e8eaf0;--muted:#7b82a0;--accent:#4f8ef7;--green:#34c87a;--red:#f05454;--amber:#f5a623;--green-bg:rgba(52,200,122,0.1);--red-bg:rgba(240,84,84,0.1);--accent-bg:rgba(79,142,247,0.1);}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1rem;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:200}
.logo{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0}
.topbar-right{display:flex;align-items:center;gap:10px}
.meta{font-size:11px;color:var(--muted);display:none}
@media(min-width:600px){.meta{display:block}}
.btn{background:var(--accent);color:#fff;border:none;padding:6px 14px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;transition:opacity .2s;white-space:nowrap}
.btn:hover{opacity:.85}
.burger{display:flex;flex-direction:column;gap:4px;cursor:pointer;padding:4px;background:none;border:none}
.burger span{width:18px;height:2px;background:var(--muted);border-radius:2px}
@media(min-width:900px){.burger{display:none}}
.layout{display:flex;min-height:calc(100vh - 52px);position:relative}
.sidebar{width:230px;background:var(--surface);border-right:1px solid var(--border);padding:1rem 0;flex-shrink:0;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto;transition:transform .25s;z-index:150}
@media(max-width:899px){.sidebar{position:fixed;top:52px;left:0;height:calc(100vh - 52px);transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}}
.overlay{display:none;position:fixed;inset:0;top:52px;background:rgba(0,0,0,.5);z-index:140}
.nav-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;padding:0 1.25rem;margin-bottom:6px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 1rem;border-radius:8px;cursor:pointer;color:var(--muted);font-size:13px;font-weight:500;transition:all .15s;margin:1px 0.5rem}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--accent-bg);color:var(--accent)}
.nav-item svg{width:15px;height:15px;flex-shrink:0}
.main{flex:1;padding:1rem;min-width:0;overflow-x:hidden}
@media(min-width:600px){.main{padding:1.25rem 1.5rem}}
.filterbar{padding:.5rem 0;border-top:1px solid var(--border);margin-top:.5rem}
.filterbar .fb-top{display:flex;justify-content:space-between;align-items:center;padding:.25rem 1rem .5rem}
.filterbar .fb-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.filterbar .filter-sections{display:flex;flex-direction:column;gap:0}
.filterbar .fs-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:.6rem 1rem .3rem;display:flex;justify-content:space-between;align-items:center}
.filterbar .chips{display:flex;flex-wrap:wrap;gap:4px;padding:0 1rem .5rem}
.filterbar .chip{font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;transition:all .15s}
.filterbar .chip:hover{border-color:var(--accent);color:var(--accent)}
.filterbar .chip.sel{background:var(--accent);border-color:var(--accent);color:#fff}
.filterbar .chip.sel-g{background:rgba(52,200,122,.15);border-color:var(--green);color:var(--green)}
.filterbar .chip.sel-r{background:rgba(240,84,84,.15);border-color:var(--red);color:var(--red)}
.filterbar .chip.more{background:transparent;color:var(--muted)}
.filterbar .active-row{display:flex;flex-wrap:wrap;gap:4px;padding:.25rem 1rem .5rem;border-top:1px solid var(--border);margin-top:.25rem}
.filterbar .active-row-label{font-size:10px;color:var(--muted);width:100%;margin-bottom:2px}
.filterbar .atag{font-size:11px;background:rgba(79,142,247,.15);border:1px solid rgba(79,142,247,.3);color:#7fb3f5;border-radius:20px;padding:2px 8px;display:flex;align-items:center;gap:4px}
.filterbar .atag-x{cursor:pointer;opacity:.6;font-size:12px}
.filterbar .atag-x:hover{opacity:1}
.filterbar .clear-all{font-size:10px;color:var(--red);background:none;border:none;cursor:pointer;font-family:inherit;padding:0}
.filterbar .search-filter{padding:0 1rem .25rem;position:relative}
.filterbar .search-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 8px;color:var(--text);font-size:11px;font-family:inherit;outline:none}
.filterbar .search-input:focus{border-color:var(--accent)}
.filterbar .search-dropdown{position:absolute;top:calc(100% - 4px);left:1rem;right:1rem;background:var(--surface2);border:1px solid var(--border);border-radius:8px;max-height:160px;overflow-y:auto;z-index:200;display:none;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.filterbar .search-dropdown.open{display:block}
.filterbar .search-option{padding:6px 10px;font-size:11px;cursor:pointer;color:var(--text)}
.filterbar .search-option:hover,.filterbar .search-option.sel{background:rgba(79,142,247,.15);color:#7fb3f5}
.filterbar .selected-pills{display:flex;flex-wrap:wrap;gap:3px;padding:4px 1rem 0}
.filterbar .pill{font-size:10px;background:rgba(79,142,247,.15);border:1px solid rgba(79,142,247,.3);color:#7fb3f5;border-radius:20px;padding:2px 6px;display:flex;align-items:center;gap:3px}
.filterbar .pill-x{cursor:pointer;opacity:.6}
.filterbar .pill-x:hover{opacity:1}
.saved-fsets{padding:.5rem 1rem;border-top:1px solid var(--border)}
.saved-fsets .sf-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:5px;display:flex;justify-content:space-between;align-items:center}
.sf-list{display:flex;flex-direction:column;gap:3px}
.sf-item{display:flex;align-items:center;justify-content:space-between;padding:4px 8px;border-radius:6px;background:var(--surface2);border:1px solid var(--border);cursor:pointer;font-size:11px;transition:all .15s}
.sf-item:hover{border-color:var(--accent);color:var(--accent)}
.sf-del{color:var(--muted);font-size:11px;padding:0 2px}
.sf-del:hover{color:var(--red)}
.fb-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.fb-title{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
.clear-all{font-size:11px;color:var(--muted);cursor:pointer;background:none;border:none;font-family:inherit}
.clear-all:hover{color:var(--red)}
.filter-sections{display:flex;flex-direction:column;gap:10px}
.fs-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.chips{display:flex;flex-wrap:wrap;gap:4px}
.chip{padding:3px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap;font-family:inherit;line-height:1.4}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.chip.sel{background:var(--accent);border-color:var(--accent);color:#fff}
.chip.sel-g{background:var(--green);border-color:var(--green);color:#fff}
.chip.sel-r{background:var(--red);border-color:var(--red);color:#fff}
.chip.more{border-style:dashed}
.search-filter{position:relative}
.search-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 10px;color:var(--text);font-size:12px;font-family:inherit;outline:none}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--muted)}
.search-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface2);border:1px solid var(--border);border-radius:8px;max-height:160px;overflow-y:auto;z-index:50;display:none;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.search-dropdown.open{display:block}
.search-option{padding:7px 12px;font-size:12px;cursor:pointer;color:var(--text)}
.search-option:hover{background:var(--surface)}
.search-option.sel{color:var(--accent)}
.selected-pills{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.pill{background:var(--accent-bg);border:1px solid var(--accent);color:var(--accent);font-size:11px;padding:2px 8px;border-radius:20px;display:flex;align-items:center;gap:5px}
.pill-x{cursor:pointer;opacity:.7;font-size:13px;line-height:1}
.pill-x:hover{opacity:1}
.active-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);align-items:center}
.active-row-label{font-size:10px;color:var(--muted);font-weight:600;white-space:nowrap}
.atag{background:var(--accent-bg);border:1px solid var(--accent);color:var(--accent);font-size:11px;padding:2px 8px;border-radius:20px;display:flex;align-items:center;gap:5px}
.atag-x{cursor:pointer;opacity:.6;font-size:13px}
.atag-x:hover{opacity:1}
.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:1rem}
@media(min-width:700px){.kpi-grid{grid-template-columns:repeat(4,1fr)}}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi.pos::before{background:var(--green)}.kpi.neg::before{background:var(--red)}.kpi.bal::before{background:var(--accent)}.kpi.neu::before{background:var(--amber)}
.kpi-label{font-size:10px;color:var(--muted);font-weight:500;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.kpi-value{font-size:18px;font-weight:700}
@media(min-width:600px){.kpi-value{font-size:20px}}
.kpi.pos .kpi-value{color:var(--green)}.kpi.neg .kpi-value{color:var(--red)}.kpi.bal .kpi-value{color:var(--accent)}.kpi.neu .kpi-value{color:var(--amber)}
.kpi-sub{font-size:10px;color:var(--muted);margin-top:4px}
.page{display:none}.page.active{display:block}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem;margin-bottom:1rem}
.card-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.875rem}
.resumen-top{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:1rem}
@media(min-width:700px){.resumen-top{grid-template-columns:300px 1fr}}
.chart-wrap{position:relative;width:100%}
.charts-grid{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:1rem}
@media(min-width:700px){.charts-grid{grid-template-columns:1fr 1fr}}
.cat-section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cat-section-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.cat-section-total{font-size:15px;font-weight:700}
.cat-item{margin-bottom:2px;border-radius:8px;overflow:hidden;border:1px solid transparent;transition:border-color .15s}
.cat-item.open{border-color:var(--border)}
.cat-row{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;border-radius:8px;transition:background .15s;user-select:none}
.cat-row:hover{background:var(--surface2)}
.cat-item.open .cat-row{background:var(--surface2);border-radius:8px 8px 0 0}
.cat-chevron{font-size:10px;color:var(--muted);transition:transform .2s;flex-shrink:0;width:14px}
.cat-item.open .cat-chevron{transform:rotate(90deg)}
.cat-name{font-size:13px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-bar-wrap{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;max-width:200px}
@media(min-width:700px){.cat-bar-wrap{max-width:300px}}
.cat-bar-fill{height:6px;border-radius:3px;transition:width .4s ease}
.cat-pct{font-size:10px;color:var(--muted);white-space:nowrap;min-width:32px;text-align:right}
.cat-total{font-size:13px;font-weight:700;white-space:nowrap;min-width:90px;text-align:right}
.cat-detail{display:none;padding:8px 12px 12px 36px;background:var(--surface2);border-radius:0 0 8px 8px}
.cat-item.open .cat-detail{display:block}
.cat-detail-label{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.sub-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.sub-row:last-child{border-bottom:none}
.sub-name{font-size:12px;color:var(--muted);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sub-bar-wrap{width:100px;height:3px;background:var(--border);border-radius:2px;flex-shrink:0}
@media(min-width:600px){.sub-bar-wrap{width:140px}}
.sub-bar-fill{height:3px;border-radius:2px;opacity:.75}
.sub-pct{font-size:10px;color:var(--muted);min-width:28px;text-align:right;flex-shrink:0}
.sub-amt{font-size:12px;font-weight:600;min-width:80px;text-align:right;flex-shrink:0}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:12px}
@media(min-width:600px){table{font-size:13px}}
th{text-align:left;padding:8px 10px;color:var(--muted);font-weight:500;border-bottom:1px solid var(--border);font-size:10px;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap}
.b-ing{background:var(--green-bg);color:var(--green)}.b-eg{background:var(--red-bg);color:var(--red)}
.amt-ing{color:var(--green);font-weight:600}.amt-eg{color:var(--red);font-weight:600}
.rank-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.rank-row:last-child{border-bottom:none}
.rank-num{width:20px;font-size:11px;color:var(--muted);font-weight:600;flex-shrink:0;text-align:center}
.rank-name{flex:1;font-size:12px;font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rank-bar-wrap{width:80px;height:3px;background:var(--surface2);border-radius:2px;flex-shrink:0}
@media(min-width:600px){.rank-bar-wrap{width:120px}}
.rank-bar-fill{height:3px;border-radius:2px}
.rank-amt{min-width:80px;text-align:right;font-size:12px;font-weight:600;flex-shrink:0}
.rank-count{font-size:10px;color:var(--muted);width:45px;flex-shrink:0;text-align:right}
.loading{display:flex;align-items:center;justify-content:center;height:200px;color:var(--muted);gap:10px;font-size:13px}
.spin{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
/* ── COBRANZAS ── */
.cob-bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:1rem;padding:0}
.cs{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 10px;color:var(--text);font-size:12px;font-family:inherit;outline:none;cursor:pointer}
.cs:focus{border-color:var(--accent)}
.cob-kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:1rem}
@media(min-width:700px){.cob-kpis{grid-template-columns:repeat(4,1fr)}}
.ct td,.ct th{white-space:nowrap;padding:7px 10px;font-size:12px}
.ct thead th{background:var(--surface2);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.ct thead th:first-child{text-align:left}
.ct th,.ct td{text-align:right}
.ct th:first-child,.ct td:first-child{text-align:left;position:sticky;left:0;background:var(--surface);z-index:1}
.ct tbody tr:hover td:first-child{background:var(--surface2)}
.ct tbody tr:hover{background:rgba(255,255,255,.03)}
.ct tbody tr{border-bottom:1px solid var(--border)}
.ct tfoot td{background:var(--surface2);font-weight:700;font-size:12px}
.cpaid{color:var(--green);font-weight:600}.clate{color:var(--amber);font-weight:600}.cno{color:var(--muted)}.ctot{font-weight:700}
.pat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px}
.pat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px}
.pat-name{font-size:13px;font-weight:600;margin-bottom:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pdots{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:8px}
.pd{width:22px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.pd.ok{background:rgba(52,200,122,.2);color:var(--green)}.pd.late{background:rgba(245,166,35,.2);color:var(--amber)}.pd.no{background:rgba(240,84,84,.15);color:var(--red)}.pd.fut{background:var(--surface2);color:var(--muted)}
.pstats{display:flex;gap:10px;font-size:11px;flex-wrap:wrap}
.pstat .pv{font-weight:700;font-size:13px}.pstat .pl{color:var(--muted);margin-top:1px}
.rep-hdr{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem;margin-bottom:1rem;text-align:center}
.rep-hdr h2{font-size:16px;font-weight:700;margin:4px 0}
.rkpis{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:1rem}
@media(min-width:600px){.rkpis{grid-template-columns:repeat(4,1fr)}}
.saved-reports{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:1rem;font-size:12px}
.saved-reports .sr-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.sr-list{display:flex;gap:6px;flex-wrap:wrap}
.sr-tag{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:3px 10px;cursor:pointer;font-size:11px;color:var(--text);display:flex;align-items:center;gap:5px;transition:all .15s}
.sr-tag:hover{border-color:var(--accent);color:var(--accent)}
.sr-tag .sr-del{color:var(--muted);font-size:10px;margin-left:2px}
.sr-tag .sr-del:hover{color:var(--red)}

</style>
</head>
<body>
<div class="topbar">
  <div style="display:flex;align-items:center;gap:10px">
    <button class="burger" onclick="toggleSidebar()"><span></span><span></span><span></span></button>
    <div class="logo"><div class="logo-dot"></div>Inversiones Marines — Finanzas 2026</div>
  </div>
  <div class="topbar-right">
    <span class="meta" id="meta-txt">Cargando...</span>
    <button class="btn" onclick="loadData()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
      Actualizar
    </button>
  </div>
</div>
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>
<div class="layout">
  <nav class="sidebar" id="sidebar">
    <div id="filterbar" class="filterbar"></div>
    <div style="padding:0 0.5rem;margin-bottom:0.5rem">
      <div class="nav-label" style="margin-bottom:10px">Principal</div>
      <div class="nav-item active" id="nav-resumen" onclick="showPage('resumen')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Resumen

<script>
const CSV='https://docs.google.com/spreadsheets/d/e/2PACX-1vRiMekDVhvEC1crwqEsgKj-S9FX9rkMhuzrQ84C-8SCo-qFD2oi6943XF6l6PUVzGLsVhyJVUSMztHa/pub?gid=1817920401&single=true&output=csv';
let allRows=[],C={},charts={};
let currentPage='resumen';
let F={tipoMov:'',anos:[],meses:[],bancos:[],cats:[],tipos:[],benefSel:[],duenos:[],inmRefs:[]};
const $=id=>document.getElementById(id);
const esc=s=>String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function fmt(n){return'$'+new Intl.NumberFormat('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}).format(Math.abs(n||0));}
function parseNum(v){if(!v&&v!==0)return 0;let s=String(v).trim().replace(/[^0-9.,\-]/g,'');if(!s||s==='-')return 0;if(/,\d{1,2}$/.test(s)&&s.includes('.')){s=s.replace(/\./g,'').replace(',','.');}else if(/,\d{1,2}$/.test(s)){s=s.replace(',','.');}else{s=s.replace(/,/g,'');}const n=parseFloat(s);return isNaN(n)?0:n;}
function parseYM(v){if(!v)return null;const s=String(v).trim();if(/^\d{4}-\d{2}-\d{2}/.test(s))return s.substring(0,7);const dmy=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);if(dmy)return`${dmy[3]}-${String(parseInt(dmy[2])).padStart(2,'0')}`;const dm=s.match(/^(\d{1,2})[\/\-]([A-Za-z]{3})[\/\-](\d{2,4})/i);if(dm){const mo={jan:'01',feb:'02',mar:'03',apr:'04',may:'05',jun:'06',jul:'07',aug:'08',sep:'09',oct:'10',nov:'11',dec:'12'}[dm[2].toLowerCase()]||'01';const y=dm[3].length===2?'20'+dm[3]:dm[3];return`${y}-${mo}`;}return null;}
function mlabel(ym){if(!ym)return'';const[y,m]=ym.split('-');return['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][parseInt(m)-1]+' '+y;}
function mapCols(fields){const find=(...terms)=>fields.find(f=>terms.some(t=>f.toLowerCase().replace(/[\s\/\-_áéíóúü]/g,'').includes(t.toLowerCase().replace(/[\s\/\-_áéíóúü]/g,''))))||null;return{fecha:find('FECHA'),ingEg:find('INGRESOEGRESO','INGRESO'),banco:find('BANCO'),tipo:find('TIPO'),cat:find('CATEGORIA','CATEGORÍA'),coment:find('COMENTARIOS'),benef:find('BENEFICIARIO'),dueno:find('DUEÑOINMUEBLE','DUEÑO','DUENO'),inmRef:find('INMUEBLEREF','INMUEBLE'),credito:find('CREDITO','CRÉDITO'),debito:find('DEBITO','DÉBITO'),montoUSD:find('MONTOUSD'),mLimpio:find('MOntoLimpio','MONTOLIMPIO','Monto_Limpio')};}
function isIng(row){const v=String(row[C.ingEg]||'').toLowerCase().trim();return v.includes('ingr')||v.includes('entr')||v.includes('abono')||v==='i';}
function getMonto(row){if(C.montoUSD){const v=parseNum(row[C.montoUSD]);if(v!==0)return Math.abs(v);}if(C.mLimpio){const v=parseNum(row[C.mLimpio]);if(v!==0)return Math.abs(v);}if(isIng(row)&&C.credito){const v=parseNum(row[C.credito]);if(v!==0)return Math.abs(v);}if(!isIng(row)&&C.debito){const v=parseNum(row[C.debito]);if(v!==0)return Math.abs(v);}return 0;}
function getBenef(row){return(row[C.benef]||'').trim();}
function getDueno(row){return(row[C.dueno]||'').trim();}
function getInmRef(row){return(row[C.inmRef]||'').trim();}
function killCharts(){Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}});charts={};}
function applyFilters(){return allRows.filter(r=>{const ym=parseYM(r[C.fecha]);if(F.anos.length&&!F.anos.includes(ym?ym.substring(0,4):''))return false;if(F.meses.length&&!F.meses.includes(ym?ym.substring(5,7):''))return false;if(F.tipoMov==='Ingreso'&&!isIng(r))return false;if(F.tipoMov==='Egreso'&&isIng(r))return false;if(F.bancos.length&&!F.bancos.includes((r[C.banco]||'').trim()))return false;if(F.cats.length&&!F.cats.includes((r[C.cat]||'').trim()))return false;if(F.tipos.length&&!F.tipos.includes((r[C.tipo]||'').trim()))return false;if(F.benefSel.length&&!F.benefSel.includes(getBenef(r)))return false;if(F.duenos.length&&!F.duenos.includes(getDueno(r)))return false;if(F.inmRefs.length&&!F.inmRefs.includes(getInmRef(r)))return false;return true;});}

function buildCatBreakdown(rows,ingMode){
  const filtered=ingMode?rows.filter(r=>isIng(r)):rows.filter(r=>!isIng(r));
  const total=filtered.reduce((s,r)=>s+getMonto(r),0);
  if(!filtered.length)return'<div style="color:var(--muted);font-size:13px;padding:.5rem 0">Sin datos para el filtro seleccionado.</div>';
  const catMap={};
  filtered.forEach(r=>{
    const cat=(r[C.cat]||'Sin categoría').trim();
    const tipo=(r[C.tipo]||'').trim();
    const benef=getBenef(r)||'Sin beneficiario';
    const m=getMonto(r);
    if(!catMap[cat])catMap[cat]={total:0,tipos:{},benefs:{}};
    catMap[cat].total+=m;
    if(tipo)catMap[cat].tipos[tipo]=(catMap[cat].tipos[tipo]||0)+m;
    catMap[cat].benefs[benef]=(catMap[cat].benefs[benef]||0)+m;
  });
  const sortedCats=Object.entries(catMap).sort((a,b)=>b[1].total-a[1].total);
  const maxCat=sortedCats[0]?.[1]?.total||1;
  const color=ingMode?'var(--green)':'var(--red)';
  const colorHex=ingMode?'#34c87a':'#f05454';
  const prefix=ingMode?'ing':'eg';
  const header=`<div class="cat-section-header"><div class="cat-section-title">${ingMode?'Ingresos':'Egresos'} por categoría</div><div class="cat-section-total" style="color:${color}">${fmt(total)}</div></div>`;
  const items=sortedCats.map(([cat,d],idx)=>{
    const pct=Math.round(d.total/total*100);const barW=Math.round(d.total/maxCat*100);
    const id=`cat-${prefix}-${idx}`;
    const tipoEntries=Object.entries(d.tipos).sort((a,b)=>b[1]-a[1]);
    const useTipo=tipoEntries.length>=2;
    const subEntries=useTipo?tipoEntries:Object.entries(d.benefs).sort((a,b)=>b[1]-a[1]);
    const subLabel=useTipo?'Por tipo':'Por beneficiario';
    const maxSub=subEntries[0]?.[1]||1;
    const subRows=subEntries.map(([name,amt])=>{const spct=Math.round(amt/d.total*100);const sbarW=Math.round(amt/maxSub*100);return`<div class="sub-row"><div class="sub-name">${esc(name)}</div><div class="sub-bar-wrap"><div class="sub-bar-fill" style="width:${sbarW}%;background:${colorHex}"></div></div><div class="sub-pct">${spct}%</div><div class="sub-amt" style="color:${color}">${fmt(amt)}</div></div>`;}).join('');
    return`<div class="cat-item" id="${id}"><div class="cat-row" onclick="toggleCat('${id}')"><span class="cat-chevron">▶</span><div class="cat-name">${esc(cat)}</div><div class="cat-bar-wrap"><div class="cat-bar-fill" style="width:${barW}%;background:${colorHex}"></div></div><div class="cat-pct">${pct}%</div><div class="cat-total" style="color:${color}">${fmt(d.total)}</div></div><div class="cat-detail"><div class="cat-detail-label">${subLabel}</div>${subRows}</div></div>`;
  }).join('');
  return header+items;
}


function buildFilters(){
  const anos=[...new Set(allRows.map(r=>{
    const ym=parseYM(r[C.fecha]);
    const y=ym?ym.substring(0,4):'';
    return y;
  }).filter(y=>y&&parseInt(y)>=2023))].sort(); // filter out bad years
  const allM=[...new Set(allRows.map(r=>{const ym=parseYM(r[C.fecha]);return ym?ym.substring(5,7):''}).filter(Boolean))].sort();
  const mesNames=['01:Ene','02:Feb','03:Mar','04:Abr','05:May','06:Jun','07:Jul','08:Ago','09:Sep','10:Oct','11:Nov','12:Dic'];
  const availM=mesNames.filter(x=>allM.includes(x.split(':')[0]));
  // Counts for smart defaults
  const bancoCounts={};allRows.forEach(r=>{const b=(r[C.banco]||'').trim();if(b)bancoCounts[b]=(bancoCounts[b]||0)+1;});
  const allBancos=Object.keys(bancoCounts).sort((a,b)=>bancoCounts[b]-bancoCounts[a]);
  const tipoCounts={};allRows.forEach(r=>{const t=(r[C.tipo]||'').trim();if(t)tipoCounts[t]=(tipoCounts[t]||0)+1;});
  const allTipos=Object.keys(tipoCounts).sort((a,b)=>tipoCounts[b]-tipoCounts[a]);
  const cats=[...new Set(allRows.map(r=>(r[C.cat]||'').trim()).filter(Boolean))].sort();
  const topCats=cats.slice(0,3);const moreCats=cats.slice(3);
  const allBenefs=[...new Set(allRows.map(r=>getBenef(r)).filter(Boolean))].sort();
  const duenoCounts={};allRows.forEach(r=>{const d=getDueno(r);if(d)duenoCounts[d]=(duenoCounts[d]||0)+1;});
  const allDuenos=Object.keys(duenoCounts).sort((a,b)=>duenoCounts[b]-duenoCounts[a]);
  const inmCounts={};allRows.forEach(r=>{const i=getInmRef(r);if(i)inmCounts[i]=(inmCounts[i]||0)+1;});
  const allInmRefs=Object.keys(inmCounts).sort((a,b)=>inmCounts[b]-inmCounts[a]);

  const tags=[];
  if(F.tipoMov)tags.push({l:F.tipoMov,rm:()=>{F.tipoMov='';rerender();}});
  F.anos.forEach(a=>tags.push({l:'Año: '+a,rm:()=>{F.anos=F.anos.filter(x=>x!==a);rerender();}}));
  F.meses.forEach(m=>{const nm=mesNames.find(x=>x.startsWith(m+':'));tags.push({l:'Mes: '+(nm?nm.split(':')[1]:m),rm:()=>{F.meses=F.meses.filter(x=>x!==m);rerender();}});});
  F.bancos.forEach(b=>tags.push({l:'Banco: '+b,rm:()=>{F.bancos=F.bancos.filter(x=>x!==b);rerender();}}));
  F.cats.forEach(c=>tags.push({l:'Cat: '+c,rm:()=>{F.cats=F.cats.filter(x=>x!==c);rerender();}}));
  F.tipos.forEach(t=>tags.push({l:'Tipo: '+t,rm:()=>{F.tipos=F.tipos.filter(x=>x!==t);rerender();}}));
  F.benefSel.forEach(b=>tags.push({l:'Benef: '+b,rm:()=>{F.benefSel=F.benefSel.filter(x=>x!==b);rerender();}}));
  F.duenos.forEach(d=>tags.push({l:'Dueño: '+d,rm:()=>{F.duenos=F.duenos.filter(x=>x!==d);rerender();}}));
  F.inmRefs.forEach(i=>tags.push({l:'Inm: '+i,rm:()=>{F.inmRefs=F.inmRefs.filter(x=>x!==i);rerender();}}));
  window._rmFns=tags.map(t=>t.rm);

  const chip=(v,selArr,field,colorCls='')=>`<button class="chip${selArr.includes(v)?' sel'+colorCls:''}" onclick="toggleF('${field}','${esc(v)}')">${esc(v)}</button>`;
  const moreBtn=(items,selArr,field,id)=>items.length?`<button class="chip more" onclick="toggleDD('${id}')" id="btn-${id}">+${items.length}▾</button><div id="${id}" style="display:none;position:fixed;background:var(--surface2);border:1px solid var(--border);border-radius:8px;min-width:140px;max-height:180px;overflow-y:auto;z-index:999;box-shadow:0 8px 24px rgba(0,0,0,.5)">${items.map(v=>`<div class="search-option${selArr.includes(v)?' sel':''}" onclick="toggleF('${field}','${esc(v)}')">${esc(v)}</div>`).join('')}</div>`:'';

  // Active tags row
  const activeRow=tags.length?`<div class="filterbar active-row"><span class="active-row-label">Activos: ${tags.length>0?`<span class="clear-all" onclick="clearAll()">Limpiar todo</span>`:''}</span>${tags.map((t,i)=>`<div class="atag">${esc(t.l)}<span class="atag-x" onclick="_rmFns[${i}]()">×</span></div>`).join('')}</div>`:'';

  $('filterbar').innerHTML=`
    <div class="fb-top"><div class="fb-title">Filtros</div>${tags.length?`<span class="clear-all" onclick="clearAll()">Limpiar</span>`:''}</div>
    <div class="filter-sections">
      <div>
        <div class="fs-label">Período</div>
        <div class="chips">
          ${anos.map(a=>`<button class="chip${F.anos.includes(a)?' sel':''}" onclick="toggleF('anos','${a}')">${a}</button>`).join('')}
        </div>
        <div class="chips" style="padding-top:0">
          ${availM.map(x=>{const[num,nom]=x.split(':');return`<button class="chip${F.meses.includes(num)?' sel':''}" onclick="toggleF('meses','${num}')" style="font-size:10px;padding:2px 7px">${nom}</button>`;}).join('')}
        </div>
      </div>
      <div>
        <div class="fs-label">Movimiento</div>
        <div class="chips">
          <button class="chip${F.tipoMov===''?' sel':''}" onclick="F.tipoMov='';rerender()">Todos</button>
          <button class="chip${F.tipoMov==='Ingreso'?' sel sel-g':''}" onclick="F.tipoMov='Ingreso';rerender()">↑ Ing</button>
          <button class="chip${F.tipoMov==='Egreso'?' sel sel-r':''}" onclick="F.tipoMov='Egreso';rerender()">↓ Egr</button>
        </div>
      </div>
      <div>
        <div class="fs-label">Categoría</div>
        <div class="chips">${['DivSocios','GastosXtra','GastosOP'].map(v=>chip(v,F.cats,'cats')).join('')}${moreBtn(cats.filter(c=>!['DivSocios','GastosXtra','GastosOP'].includes(c)),F.cats,'cats','dd-cats')}</div>
      </div>
      <div>
        <div class="fs-label">Banco</div>
        <div class="chips">${allBancos.slice(0,3).map(v=>chip(v,F.bancos,'bancos')).join('')}${moreBtn(allBancos.slice(3),F.bancos,'bancos','dd-bancos')}</div>
      </div>
      <div>
        <div class="fs-label">Tipo</div>
        <div class="chips">${allTipos.slice(0,3).map(v=>chip(v,F.tipos,'tipos')).join('')}${moreBtn(allTipos.slice(3),F.tipos,'tipos','dd-tipos')}</div>
      </div>
      <div>
        <div class="fs-label">Beneficiario</div>
        <div style="padding:0 1rem .5rem;position:relative">
          <input class="search-input" id="benef-input" placeholder="Buscar..." oninput="filterSearchList('benef-input','benef-drop')" onfocus="openDrop('benef-drop')" autocomplete="off" style="width:100%">
          <div class="search-dropdown" id="benef-drop">${allBenefs.map(b=>`<div class="search-option${F.benefSel.includes(b)?' sel':''}" onclick="toggleBenef('${esc(b)}')">${esc(b)}</div>`).join('')}</div>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:3px;padding:0 1rem .5rem">${F.benefSel.map(b=>`<div class="pill">${esc(b)}<span class="pill-x" onclick="toggleBenef('${esc(b)}')">×</span></div>`).join('')}</div>
      </div>
      <div>
        <div class="fs-label">Dueño Inmueble</div>
        <div class="chips">${['Limoncito','Parcela 7','El Negrito'].map(v=>chip(v,F.duenos,'duenos')).join('')}${moreBtn(allDuenos.filter(d=>!['Limoncito','Parcela 7','El Negrito'].includes(d)),F.duenos,'duenos','dd-duenos')}</div>
      </div>
      <div>
        <div class="fs-label">Inmueble Ref</div>
        <div class="chips">${allInmRefs.slice(0,3).map(v=>chip(v,F.inmRefs,'inmRefs')).join('')}${moreBtn(allInmRefs.slice(3),F.inmRefs,'inmRefs','dd-inmrefs')}</div>
      </div>
    </div>
    ${activeRow}`;

  // Update saved filter sets list
  const savedFS=JSON.parse(localStorage.getItem('filterSets')||'[]');
  const sfList=$('saved-fsets-list');
  if(sfList){
    sfList.innerHTML=savedFS.length
      ?savedFS.map((s,i)=>`<div class="sf-item" onclick="loadFilterSet(${i})"><span>${esc(s.name)}</span><span class="sf-del" onclick="event.stopPropagation();delFilterSet(${i})">✕</span></div>`).join('')
      :`<div style="font-size:11px;color:var(--muted);padding:2px 0">Sin vistas guardadas</div>`;
  }

  document.onclick=e=>{['dd-bancos','dd-cats','dd-tipos','dd-duenos','dd-inmrefs'].forEach(id=>{const el=$(id);if(el&&el.style.display!=='none'&&!el.contains(e.target)&&!e.target.closest('#btn-'+id))el.style.display='none';});['benef-drop'].forEach(id=>{const dd=$(id);if(dd&&dd.classList.contains('open')&&!dd.contains(e.target)&&e.target.id!==id.replace('-drop','-input'))dd.classList.remove('open');});};
}

function toggleDD(id){const el=$(id);if(el)el.style.display=el.style.display==='none'?'block':'none';}
function toggleF(field,val){const arr=F[field];const i=arr.indexOf(val);if(i>=0)arr.splice(i,1);else arr.push(val);rerender();}
function filterSearchList(inputId,dropId){const q=($(inputId)?.value||'').toLowerCase();const dd=$(dropId);if(!dd)return;dd.querySelectorAll('.search-option').forEach(el=>{el.style.display=el.textContent.toLowerCase().includes(q)?'':'none';});dd.classList.add('open');}
function openDrop(id){const dd=$(id);if(dd)dd.classList.add('open');}
function toggleBenef(val){const i=F.benefSel.indexOf(val);if(i>=0)F.benefSel.splice(i,1);else F.benefSel.push(val);rerender();}

function buildKPI(rows){
  const ing=rows.filter(r=>isIng(r));const eg=rows.filter(r=>!isIng(r));
  const tI=ing.reduce((s,r)=>s+getMonto(r),0);const tE=eg.reduce((s,r)=>s+getMonto(r),0);const bal=tI-tE;
  $('kpi-grid').innerHTML=`<div class="kpi pos"><div class="kpi-label">Ingresos</div><div class="kpi-value">${fmt(tI)}</div><div class="kpi-sub">${ing.length} mov.</div></div><div class="kpi neg"><div class="kpi-label">Egresos</div><div class="kpi-value">${fmt(tE)}</div><div class="kpi-sub">${eg.length} mov.</div></div><div class="kpi bal"><div class="kpi-label">Balance</div><div class="kpi-value">${fmt(bal)}</div><div class="kpi-sub">${bal>=0?'Superávit':'Déficit'}</div></div><div class="kpi neu"><div class="kpi-label">Registros</div><div class="kpi-value">${rows.length}</div><div class="kpi-sub">de ${allRows.length} total</div></div>`;
  return{tI,tE,bal,ing,eg};
}

const ML2=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
function ml(ym){const[,m]=String(ym).split('-');return ML2[parseInt(m)-1]||ym;}
function mlf(ym){const[y,m]=String(ym).split('-');return ML2[parseInt(m)-1]+' '+y;}
function pn(v){// parse number: handles int, float, nan, -1,150,00 format
  if(v===null||v===undefined||v==='')return 0;
  const s=String(v).trim();
  if(!s||s==='-'||s.toLowerCase()==='nan')return 0;
  let c=s.replace(/[$\s]/g,'');
  const commas=(c.match(/,/g)||[]).length;
  const dots=(c.match(/\./g)||[]).length;
  if(commas>=2){const lc=c.lastIndexOf(',');const dec=c.substring(lc+1);if(dec.length===2){c=c.substring(0,lc).replace(/,/g,'')+'.'+dec;}else{c=c.replace(/,/g,'');}}
  else if(dots>=2){const ld=c.lastIndexOf('.');c=c.substring(0,ld).replace(/\./g,'')+'.'+c.substring(ld+1);}
  else if(commas===1&&dots===1){const ld=c.lastIndexOf('.'),lc=c.lastIndexOf(',');if(lc>ld){c=c.replace(/\./g,'').replace(',','.');}else{c=c.replace(/,/g,'');}}
  else if(commas===1){const pts=c.split(',');c=(pts[1]&&pts[1].length<=2)?c.replace(',','.'):c.replace(/,/g,'');}
  c=c.replace(/[^0-9.\-]/g,'');
  const n=parseFloat(c);return isNaN(n)?0:n;
}

function parseCob(rows){
  cobData={};const mesSet=new Set(),inqSet=new Set();
  // DEBUG: log first few raw MES values
  const sample=rows.slice(0,5).map(r=>r['MES']);
  console.warn('=== COB DEBUG ===');
  console.warn('Total rows:', rows.length);
  // Show sample of 2025 rows
  const rows2025=rows.filter(r=>String(r['ANO']).trim()==='2025').slice(0,5);
  console.warn('2025 sample:', JSON.stringify(rows2025.map(r=>({ano:r['ANO'],mes:r['MES'],inq:(r['Inquilinos']||'').substring(0,20)}))));
  setTimeout(()=>{
    console.warn('cobMeses 2025:', JSON.stringify(cobMeses.filter(m=>m.startsWith('2025'))));
    console.warn('cobMeses 2026:', JSON.stringify(cobMeses.filter(m=>m.startsWith('2026'))));
    const anos=[...new Set(Object.values(cobData).map(r=>r.ano))].sort();
    console.warn('anos in cobData:', JSON.stringify(anos));
  }, 200);
  rows.forEach(r=>{
    const ano=pn(r['ANO']);
    const inq=(r['Inquilinos']||'').trim();
    if(!inq||inq.startsWith('Desocupado')||!inq)return;
    const mesRaw=String(r['MES']||'').trim().replace(/\u00a0/g,' ').replace(/[\u2013\u2014]/g,'-');
    if(!mesRaw)return;
    let mes='';
    // Spanish month names as exported by Google Sheets
    const ESP={'ene':'01','feb':'02','mar':'03','abr':'04','may':'05','jun':'06',
               'jul':'07','ago':'08','sep':'09','oct':'10','nov':'11','dic':'12'};
    // More flexible regex: any separator including dot, space combinations
    const espM=mesRaw.match(/^(\d{1,2})[^a-zA-Z]+([a-zA-Z]{3})[^a-zA-Z\d]*(\d{2,4})$/i);
    // Format: YYYY-MM or YYYY-MM-DD
    const isoM=mesRaw.match(/^(\d{4})-(\d{2})/);
    // Format: MM/DD/YYYY or M/D/YYYY
    const slashM=mesRaw.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
    // Excel serial number (5 digits)
    const serialM=/^\d{5}$/.test(mesRaw);
    if(espM){
      const monthKey=espM[2].toLowerCase().substring(0,3);
      const mm=ESP[monthKey]||'01';
      const yy=espM[3].length===2?'20'+espM[3]:espM[3];
      mes=yy+'-'+mm;
    } else if(isoM){
      mes=isoM[1]+'-'+isoM[2].padStart(2,'0');
    } else if(slashM){
      mes=slashM[3]+'-'+slashM[1].padStart(2,'0');
    } else if(serialM){
      const serial=parseInt(mesRaw);
      const d=new Date(1899,11,30+serial);
      mes=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    } else {
      const d=new Date(mesRaw);
      if(isNaN(d.getTime()))return;
      mes=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    }
    if(!mes)return;
    // Only process 2025 onwards
    if(parseInt(mes.split('-')[0])<2025)return;
    const pago=(r[' Pagó?']||r['Pagó?']||'').trim();
    const monto=Math.abs(pn(r['Monto $']));
    const balance=pn(r['Balance']);
    const canon=Math.abs(pn(r['Canon Vigente']));
    const bat=Math.abs(pn(r['Baticueva 20%']));
    const ga=Math.abs(pn(r['G&A 60% ($)']));
    const op=Math.abs(pn(r['Op, & Mantenimiento 20% ($)']));
    const comSocios=Math.abs(pn(r['Comision Socios C/U $']));
    const prov=Math.abs(pn(r['Provision Reserva $']));
    // Use inq+mes as key - mes already contains correct year from parsing
    const mesYear=mes.split('-')[0];
    const key=`${inq}|||${mes}`;
    // Only merge if same parsed year (prevents cross-year accumulation)
    if(!cobData[key]){
      cobData[key]={ano:parseInt(mesYear),inq,mes,pago,monto,balance,canon,bat,ga,op,comSocios,prov};
    } else {
      cobData[key].monto+=monto;
      if(balance!==0)cobData[key].balance=balance;
      // Canon/provision: take the non-zero value, don't sum (same month = same canon)
      if(canon>0)cobData[key].canon=canon;
      if(bat>0)cobData[key].bat=bat;
      if(ga>0)cobData[key].ga=ga;
      if(op>0)cobData[key].op=op;
      if(comSocios>0)cobData[key].comSocios=comSocios;
      if(prov>0)cobData[key].prov=prov;
      if(pago)cobData[key].pago=pago;
    }
    mesSet.add(mes);inqSet.add(inq);
  });
  cobMeses=[...mesSet].sort();
  cobInqs=[...inqSet].sort();
}

function getTenants(yearFilt){
  const t={};
  Object.values(cobData).forEach(r=>{
    const mesYear=r.mes?r.mes.split('-')[0]:'';
    if(yearFilt&&mesYear!==String(yearFilt))return;
    if(!t[r.inq])t[r.inq]={};
    t[r.inq][r.mes]=r;
  });
  return t;
}

function getMeses(yearFilt){
  return cobMeses.filter(m=>!yearFilt||m.split('-')[0]===String(yearFilt));
}

function showCob(view){
  cobView=view;
  // Activate correct nav items
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  $('page-cobranzas').classList.add('active');
  const nav=$('nav-cob-'+view.replace('reporte','reporte').replace('prov','prov'));
  if(nav)nav.classList.add('active');
  closeSidebar();
  killCob();
  loadCob(()=>renderCob());
}

function renderCob(){
  // Use selected year or default to most recent year with data
  const allAvailYears=[...new Set(cobMeses.map(m=>m.split('-')[0]))].filter(y=>parseInt(y)>=2025).sort();
  if(!cobMetaYear||!allAvailYears.includes(cobMetaYear)) cobMetaYear=allAvailYears[allAvailYears.length-1]||'2026';
  const activeYear=cobMetaYear;
  const tenants=getTenants(activeYear);
  const meses=getMeses(activeYear);
  const filtM=cobMF;
  const filtInq=cobIF.toLowerCase();
  const shownInqs=Object.keys(tenants).filter(i=>!filtInq||i.toLowerCase().includes(filtInq)).sort();
  const kpiMeses=filtM?[filtM]:meses.filter(m=>{
    return shownInqs.some(i=>(tenants[i]||{})[m]?.monto>0||(tenants[i]||{})[m]?.canon>0);
  });

  // KPIs
  let totCob=0,totBal=0,totGa=0,totBat=0,totOp=0,pagaron=0,noPag=0,atrasados=0;
  shownInqs.forEach(i=>{
    kpiMeses.forEach(m=>{
      const d=(tenants[i]||{})[m]||{};
      totCob+=d.monto||0;
      totGa+=d.ga||0;totBat+=d.bat||0;totOp+=d.op||0;
    });
    // last balance
    const lastM=meses.filter(m=>(tenants[i]||{})[m]).slice(-1)[0];
    if(lastM)totBal+=(tenants[i][lastM]||{}).balance||0;
    if(filtM){const st=(tenants[i]||{})[filtM]?.pago||'';if(st.includes('Si'))pagaron++;else if(st==='No')noPag++;if(st.includes('Atrasado'))atrasados++;}
  });
  const prov=totBat+totGa+totOp;
  const mesOpts=meses.map(m=>`<option value="${m}"${filtM===m?'selected':''}>${mlf(m)}</option>`).join('');
  const inqOpts2026=shownInqs.map(i=>`<option value="${i}"${cobRI===i?'selected':''}>${i}</option>`).join('');

  const saveBtn=cobView!=='reporte'?'<button class="btn" style="font-size:11px;padding:5px 10px;background:var(--surface2);color:var(--text)" onclick="saveReport()">💾 Guardar vista</button>':'';
  const topBar='<div class="cob-bar">'
    +'<select class="cs" onchange="cobMF=this.value;killCob();renderCob()">'
      +'<option value="">Todos los meses 2026</option>'+mesOpts
    +'</select>'
    +'<input class="cs" style="width:180px" placeholder="Buscar inquilino..." value="'+esc(cobIF)+'" oninput="cobIF=this.value;renderCob()">'
    +'<button class="btn" style="font-size:11px;padding:5px 10px" onclick="cobLoaded=false;killCob();loadCob(()=>renderCob())">🔄 Actualizar</button>'
    +saveBtn
    +'</div>';

  const kpiBar='<div class="cob-kpis">'
    +'<div class="kpi pos"><div class="kpi-label">Cobrado</div><div class="kpi-value">'+fmt(totCob)+'</div><div class="kpi-sub">'+(filtM?pagaron+' inquilinos':'Acumulado 2026')+'</div></div>'
    +'<div class="kpi neg"><div class="kpi-label">Cta × Cobrar</div><div class="kpi-value">'+fmt(Math.abs(Math.min(totBal,0)))+'</div><div class="kpi-sub">'+(atrasados?atrasados+' atrasados':'saldo pendiente')+'</div></div>'
    +'<div class="kpi bal"><div class="kpi-label">Provisión total</div><div class="kpi-value">'+fmt(prov)+'</div><div class="kpi-sub">Bat+G&A+Op</div></div>'
    +'<div class="kpi neu"><div class="kpi-label">Div. Socios c/u</div><div class="kpi-value">'+fmt(totGa/NS)+'</div><div class="kpi-sub">G&A ÷ '+NS+' socios</div></div>'
    +'</div>';

  const savedBar=savedReports.length?'<div class="saved-reports"><div class="sr-title">Vistas guardadas</div><div class="sr-list">'+savedReports.map((r,i)=>'<div class="sr-tag" onclick="loadReport('+i+')"><span>'+esc(r.label)+'</span><span class="sr-del" onclick="event.stopPropagation();delReport('+i+')">✕</span></div>').join('')+'</div></div>':'';

  let body='';

  // ── PAGOS POR MES ──
  if(cobView==='pagos'){
    const shownM=filtM?[filtM]:meses;
    const thM=shownM.map(m=>`<th>${ml(m)}</th>`).join('');
    const trows=shownInqs.map(inq=>{
      let tot=0;
      const cells=shownM.map(m=>{
        const d=(tenants[inq]||{})[m]||{};tot+=d.monto||0;
        const st=d.pago||'';
        if(!st&&!d.canon)return`<td>—</td>`;
        if(st.includes('Atrasado'))return`<td class="clate">⚠ ${d.monto>0?'$'+Math.round(d.monto).toLocaleString():'—'}</td>`;
        if(st==='Si'||st.includes('Adelantado'))return`<td class="cpaid">✓ ${d.monto>0?'$'+Math.round(d.monto).toLocaleString():'—'}</td>`;
        return`<td class="cno">✗ —</td>`;
      }).join('');
      return`<tr><td>${esc(inq)}</td>${cells}<td class="ctot">${tot>0?'$'+Math.round(tot).toLocaleString():'—'}</td></tr>`;
    }).join('');
    const tfootM=shownM.map(m=>{const t=shownInqs.reduce((s,i)=>s+((tenants[i]||{})[m]?.monto||0),0);return`<td>${t>0?'$'+Math.round(t).toLocaleString():'—'}</td>`;}).join('');
    const grand=shownInqs.reduce((s,i)=>s+shownM.reduce((ss,m)=>ss+((tenants[i]||{})[m]?.monto||0),0),0);
    body=`<div class="card" style="padding:0"><div class="tbl-wrap"><table class="ct">
      <thead><tr><th>Inquilino</th>${thM}<th>Total</th></tr></thead>
      <tbody>${trows||'<tr><td colspan="20" style="text-align:center;padding:1.5rem;color:var(--muted)">Sin datos</td></tr>'}</tbody>
      <tfoot><tr><td>TOTAL</td>${tfootM}<td>$${Math.round(grand).toLocaleString()}</td></tr></tfoot>
    </table></div></div>`;
  }

  // ── META vs COBRADO ──
  else if(cobView==='meta'){
    // Year filter for meta tab
    const availYears=[...new Set(cobMeses.map(m=>m.split('-')[0]))].filter(y=>parseInt(y)>=2025).sort();
    const selYear=cobMetaYear||availYears[availYears.length-1]||'2026';
    const yearOpts=availYears.map(y=>`<option value="${y}"${y===selYear?'selected':''}>${y}</option>`).join('');

    // Filter months by selected year, with data
    const today=new Date();
    const hasMeses=meses.filter(m=>{
      if(!m.startsWith(selYear))return false;
      const [y,mo]=m.split('-');
      const mesDate=new Date(parseInt(y),parseInt(mo)-1,1);
      const hasCanon=shownInqs.some(i=>Math.abs((tenants[i]||{})[m]?.canon||0)>0);
      const hasCobro=shownInqs.some(i=>((tenants[i]||{})[m]?.monto||0)>0);
      return hasCobro||(hasCanon&&mesDate<=today);
    });
    const metaV=hasMeses.map(m=>shownInqs.reduce((s,i)=>s+Math.abs((tenants[i]||{})[m]?.canon||0),0));
    const cobV=hasMeses.map(m=>shownInqs.reduce((s,i)=>s+((tenants[i]||{})[m]?.monto||0),0));
    const pctV=hasMeses.map((m,i)=>metaV[i]>0?Math.round(cobV[i]/metaV[i]*100):0);
    // Totals and averages
    const totalMeta=metaV.reduce((s,v)=>s+v,0);
    const totalCob=cobV.reduce((s,v)=>s+v,0);
    const avgCob=hasMeses.length>0?Math.round(totalCob/hasMeses.length):0;
    const avgMeta=hasMeses.length>0?Math.round(totalMeta/hasMeses.length):0;
    const totalPct=totalMeta>0?Math.round(totalCob/totalMeta*100):0;
    const kpiColor=totalPct>=100?'pos':totalPct>=75?'neu':'neg';
    const diffColor=totalCob>=totalMeta?'var(--green)':'var(--red)';
    const pctColor=totalPct>=100?'var(--green)':totalPct>=75?'var(--amber)':'var(--red)';
    const tableRows=hasMeses.map((m,i)=>{
      const diff=cobV[i]-metaV[i];const pct=pctV[i];
      const dc=diff>=0?'var(--green)':'var(--red)';
      const pc=pct>=100?'var(--green)':pct>=75?'var(--amber)':'var(--red)';
      return '<tr><td>'+mlf(m)+'</td>'
        +'<td>$'+Math.round(metaV[i]).toLocaleString()+'</td>'
        +'<td style="color:var(--green);font-weight:600">$'+Math.round(cobV[i]).toLocaleString()+'</td>'
        +'<td style="color:'+dc+';font-weight:600">'+(diff>=0?'+':'')+'$'+Math.round(Math.abs(diff)).toLocaleString()+'</td>'
        +'<td><span style="font-weight:700;color:'+pc+'">'+pct+'%</span></td></tr>';
    }).join('');
    body='<div class="cob-bar" style="margin-bottom:12px;gap:8px;align-items:center">'
      +'<span style="font-size:12px;color:var(--muted);font-weight:600">Año:</span>'
      +'<select class="cs" onchange="cobMetaYear=this.value;killCob();renderCob()">'+yearOpts+'</select>'
      +'</div>'
      +'<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px">'
        +'<div class="kpi pos"><div class="kpi-label">Total cobrado</div><div class="kpi-value">$'+Math.round(totalCob).toLocaleString()+'</div><div class="kpi-sub">'+hasMeses.length+' meses</div></div>'
        +'<div class="kpi bal"><div class="kpi-label">Total meta</div><div class="kpi-value">$'+Math.round(totalMeta).toLocaleString()+'</div><div class="kpi-sub">Canon acumulado</div></div>'
        +'<div class="kpi neu"><div class="kpi-label">Promedio/mes</div><div class="kpi-value">$'+avgCob.toLocaleString()+'</div><div class="kpi-sub">Meta: $'+avgMeta.toLocaleString()+'</div></div>'
        +'<div class="kpi '+kpiColor+'"><div class="kpi-label">% Cumplimiento</div><div class="kpi-value">'+totalPct+'%</div><div class="kpi-sub">del año</div></div>'
      +'</div>'
      +'<div class="card"><div class="card-title">Meta (Canon Vigente) vs Cobrado — '+selYear+'</div>'
        +'<div class="chart-wrap"><canvas id="ch-meta" style="max-height:260px"></canvas></div></div>'
      +'<div class="card" style="margin-top:12px"><div class="tbl-wrap"><table class="ct">'
        +'<thead><tr><th>Mes</th><th>Meta (Canon)</th><th>Cobrado</th><th>Diferencia</th><th>% Cumplimiento</th></tr></thead>'
        +'<tbody>'+tableRows
        +'<tr style="background:var(--surface2);border-top:2px solid var(--border)">'
          +'<td style="font-weight:700">TOTAL</td>'
          +'<td style="font-weight:700">$'+Math.round(totalMeta).toLocaleString()+'</td>'
          +'<td style="font-weight:700;color:var(--green)">$'+Math.round(totalCob).toLocaleString()+'</td>'
          +'<td style="font-weight:700;color:'+diffColor+'">'+(totalCob>=totalMeta?'+':'')+'$'+Math.round(Math.abs(totalCob-totalMeta)).toLocaleString()+'</td>'
          +'<td style="font-weight:700;color:'+pctColor+'">'+totalPct+'%</td>'
        +'</tr>'
        +'<tr style="background:var(--surface2)">'
          +'<td style="font-weight:600;color:var(--muted)">PROMEDIO/MES</td>'
          +'<td style="color:var(--muted)">$'+avgMeta.toLocaleString()+'</td>'
          +'<td style="color:var(--green);font-weight:600">$'+avgCob.toLocaleString()+'</td>'
          +'<td>—</td><td>—</td>'
        +'</tr>'
        +'</tbody></table></div></div>';
    setTimeout(()=>{
      const ctx=$('ch-meta');if(!ctx)return;
      cobCharts.meta=new Chart(ctx,{type:'bar',data:{labels:hasMeses.map(m=>mlf(m)),datasets:[
        {label:'Meta canon',data:metaV,backgroundColor:'rgba(79,142,247,.25)',borderColor:'rgba(79,142,247,.8)',borderWidth:2,borderRadius:4},
        {label:'Cobrado',data:cobV,backgroundColor:'rgba(52,200,122,.75)',borderRadius:4},
        {label:'% cobrado',data:pctV,type:'line',yAxisID:'y2',borderColor:'#f5a623',backgroundColor:'transparent',borderWidth:2,pointRadius:4,pointBackgroundColor:'#f5a623',tension:0.3}
      ]},options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{position:'top',labels:{color:tc,font:{size:11},padding:12,boxWidth:12}},tooltip:{callbacks:{label:c=>c.dataset.yAxisID==='y2'?`${c.dataset.label}: ${c.raw}%`:`${c.dataset.label}: $${Math.round(c.raw).toLocaleString()}`}}},
        scales:{x:{ticks:{color:tc,font:{size:10},maxRotation:45},grid:{color:gc}},y:{ticks:{color:tc,font:{size:10},callback:v=>'$'+Math.round(v).toLocaleString()},grid:{color:gc}},y2:{position:'right',ticks:{color:'#f5a623',font:{size:10},callback:v=>v+'%'},grid:{display:false},min:0}}}});
    },80);
  }

  // ── RANKING DEUDA ──
  else if(cobView==='deuda'){
    // Find current month: most recent month <= today with actual canon data
    const now=new Date();
    const nowYM=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
    // Get all months across ALL years with data
    const allMesesAll=cobMeses.filter(m=>parseInt(m.split('-')[0])>=2025).sort();
    // Pick the most recent month that is <= current date
    const curM=allMesesAll.filter(m=>m<=nowYM).slice(-1)[0]||allMesesAll[allMesesAll.length-1];
    const curYear=curM?curM.split('-')[0]:'2026';

    // Get all tenants for that year
    const tenantsAll=getTenants(curYear);
    const allInqsForMonth=Object.keys(tenantsAll).filter(i=>tenantsAll[i][curM]);

    // Build ranking from balance column
    const rankRows=allInqsForMonth.map(inq=>{
      const d=tenantsAll[inq][curM]||{};
      const bal=d.balance||0;
      // Negative balance = owes money
      const deuda=bal<0?Math.abs(bal):0;
      const canon=Math.abs(d.canon||0);
      return{inq,deuda,canon,bal};
    }).sort((a,b)=>b.deuda-a.deuda);

    const totalD=rankRows.reduce((s,r)=>s+r.deuda,0);
    const maxD=rankRows.find(r=>r.deuda>0)?.deuda||1;

    const barRows=rankRows.map(r=>{
      const w=r.deuda>0?Math.round(r.deuda/maxD*100):0;
      const amtStr='$'+Math.round(r.deuda).toLocaleString();
      const barColor=r.deuda>0?'rgba(79,142,247,0.85)':'rgba(255,255,255,0.06)';
      const amtColor=r.deuda>0?'#5b9cf6':'var(--muted)';
      return '<div style="display:flex;align-items:center;gap:10px;margin-bottom:9px">'
        +'<div style="width:190px;font-size:12px;text-align:right;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0">'+esc(r.inq)+'</div>'
        +'<div style="flex:1;background:var(--border);border-radius:3px;height:18px">'
          +'<div style="width:'+w+'%;height:18px;background:'+barColor+';border-radius:3px;transition:width .3s;min-width:'+(r.deuda>0?'3px':'0')+'"></div>'
        +'</div>'
        +'<div style="width:90px;font-size:12px;font-weight:700;color:'+amtColor+';text-align:right">'+amtStr+'</div>'
        +'</div>';
    }).join('');

    body='<div class="card">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">'
        +'<div>'
          +'<div style="font-size:14px;font-weight:700">Balance Inquilinos — '+mlf(curM)+'</div>'
          +'<div style="font-size:11px;color:var(--muted);margin-top:3px">Saldo pendiente columna Balance — mayor a menor</div>'
        +'</div>'
        +'<div style="text-align:right">'
          +'<div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">Total pendiente</div>'
          +'<div style="font-size:20px;font-weight:700;color:var(--red)">$'+Math.round(totalD).toLocaleString()+'</div>'
        +'</div>'
      +'</div>'
      +barRows
      +'</div>';
  } else if(cobView==='patron'){
    const cards=shownInqs.map(inq=>{
      const dots=meses.map(m=>{
        const d=(tenants[inq]||{})[m]||{};const st=d.pago||'';
        if(!d.canon&&!d.monto&&!st)return`<div class="pd fut" title="${mlf(m)}">·</div>`;
        if(st.includes('Atrasado'))return`<div class="pd late" title="${mlf(m)} Atrasado">A</div>`;
        if(st==='Si'||st.includes('Adelantado'))return`<div class="pd ok" title="${mlf(m)} Pagó">✓</div>`;
        return`<div class="pd no" title="${mlf(m)} No pagó">✗</div>`;
      }).join('');
      const rm=meses.filter(m=>(tenants[inq]||{})[m]?.canon>0||(tenants[inq]||{})[m]?.monto>0);
      const pg=rm.filter(m=>{const st=(tenants[inq]||{})[m]?.pago||'';return st==='Si'||st.includes('Adelantado');}).length;
      const at=rm.filter(m=>(tenants[inq]||{})[m]?.pago?.includes('Atrasado')).length;
      const np=rm.filter(m=>(tenants[inq]||{})[m]?.pago==='No').length;
      const totP=rm.reduce((s,m)=>s+((tenants[inq]||{})[m]?.monto||0),0);
      const lastM=meses.filter(m=>(tenants[inq]||{})[m]).slice(-1)[0];
      const lastBal=lastM?(tenants[inq][lastM]?.balance||0):0;
      return`<div class="pat-card">
        <div class="pat-name" title="${esc(inq)}">${esc(inq)}</div>
        <div class="pdots">${dots}</div>
        <div class="pstats">
          <div class="pstat"><div class="pv" style="color:var(--green)">${pg}</div><div class="pl">Pagó</div></div>
          <div class="pstat"><div class="pv" style="color:var(--amber)">${at}</div><div class="pl">Atrasado</div></div>
          <div class="pstat"><div class="pv" style="color:var(--red)">${np}</div><div class="pl">No pagó</div></div>
          <div class="pstat"><div class="pv">$${Math.round(totP).toLocaleString()}</div><div class="pl">Cobrado</div></div>
          <div class="pstat"><div class="pv" style="color:${lastBal<0?'var(--red)':'var(--green)'}">$${Math.round(lastBal).toLocaleString()}</div><div class="pl">Balance</div></div>
        </div></div>`;
    }).join('');
    body=`<div class="pat-grid">${cards||'<div style="color:var(--muted)">Sin datos</div>'}</div>`;
  }

  // ── PROVISIONES ──
  else if(cobView==='prov'){
    // Only show months with actual data, no future months
    const now2=new Date();
    const nowYM2=now2.getFullYear()+'-'+String(now2.getMonth()+1).padStart(2,'0');
    const provMeses=meses.filter(m=>m<=nowYM2&&shownInqs.some(i=>(tenants[i]||{})[m]?.monto>0||(tenants[i]||{})[m]?.comCob>0));

    function pCell(m,fn){const t=shownInqs.reduce((s,i)=>s+fn((tenants[i]||{})[m]||{}),0);return '<td style="text-align:right">'+(t>0?'$'+Math.round(t).toLocaleString():'—')+'</td>';}
    function pRow(label,fn,color){
      const cells=provMeses.map(m=>pCell(m,fn)).join('');
      const tot=provMeses.reduce((s,m)=>s+shownInqs.reduce((ss,i)=>ss+fn((tenants[i]||{})[m]||{}),0),0);
      return '<tr><td>'+label+'</td>'+cells+'<td style="text-align:right;font-weight:700;color:'+color+'">'+(tot>0?'$'+Math.round(tot).toLocaleString():'—')+'</td></tr>';
    }

    const thM2=provMeses.map(m=>'<th style="text-align:right">'+mlf(m)+'</th>').join('');

    // Cobrado row
    const cobCells=provMeses.map(m=>pCell(m,d=>d.monto||0)).join('');
    const cobTot=provMeses.reduce((s,m)=>s+shownInqs.reduce((ss,i)=>ss+((tenants[i]||{})[m]?.monto||0),0),0);

    // ComTot = comSocios * NS
    const comTotCells=provMeses.map(m=>{
      const t=shownInqs.reduce((s,i)=>s+((tenants[i]||{})[m]?.comSocios||0),0)*NS;
      return '<td style="text-align:right;color:var(--accent);font-weight:600">'+(t>0?'$'+Math.round(t).toLocaleString():'—')+'</td>';
    }).join('');
    const comTotTot=provMeses.reduce((s,m)=>s+shownInqs.reduce((ss,i)=>ss+((tenants[i]||{})[m]?.comSocios||0),0),0)*NS;

    // Provision total
    const provTotCells=provMeses.map(m=>{
      const t=shownInqs.reduce((s,i)=>s+((tenants[i]||{})[m]?.prov||0),0);
      return '<td style="text-align:right;font-weight:700;color:var(--accent)">'+(t>0?'$'+Math.round(t).toLocaleString():'—')+'</td>';
    }).join('');
    const provTotTot=provMeses.reduce((s,m)=>s+shownInqs.reduce((ss,i)=>ss+((tenants[i]||{})[m]?.prov||0),0),0);

    // Mesada c/u row
    const mesadaCells=provMeses.map(m=>{
      const t=shownInqs.reduce((s,i)=>s+((tenants[i]||{})[m]?.comSocios||0),0);
      return '<td style="text-align:right;color:var(--green)">'+(t>0?'$'+Math.round(t).toLocaleString():'—')+'</td>';
    }).join('');
    const mesadaTot=provMeses.reduce((s,m)=>s+shownInqs.reduce((ss,i)=>ss+((tenants[i]||{})[m]?.comSocios||0),0),0);

    body='<div class="card" style="padding:0"><div class="tbl-wrap"><table class="ct">'
      +'<thead><tr><th>Concepto</th>'+thM2+'<th style="text-align:right">Total</th></tr></thead>'
      +'<tbody>'
      +'<tr><td style="color:var(--green);font-weight:600">💵 Cobrado del mes</td>'+cobCells+'<td style="text-align:right;font-weight:700;color:var(--green)">$'+Math.round(cobTot).toLocaleString()+'</td></tr>'
      +pRow('💼 Comisión Cobranzas',d=>d.comCob||0,'#a78bfa')
      +pRow('👤 Comisión Socios C/U',d=>d.comSocios||0,'var(--accent)')
      +'<tr><td style="font-weight:600">👥 Comisión Total (x'+NS+' socios)</td>'+comTotCells+'<td style="text-align:right;font-weight:700;color:var(--accent)">$'+Math.round(comTotTot).toLocaleString()+'</td></tr>'
      +'<tr><td style="font-weight:700">📦 Provisión Reserva</td>'+provTotCells+'<td style="text-align:right;font-weight:700;color:var(--accent)">$'+Math.round(provTotTot).toLocaleString()+'</td></tr>'
      +'</tbody>'
      +'<tfoot><tr><td>💰 Mesada estimada c/u</td>'+mesadaCells+'<td style="text-align:right;color:var(--green);font-weight:700">$'+Math.round(mesadaTot/provMeses.length||0).toLocaleString()+'</td></tr></tfoot>'
      +'</table></div></div>';
  }

  // ── REPORTE INQUILINO ──
  else if(cobView==='reporte'){
    const allT=getTenants(null);
    const allInqs=[...new Set(Object.values(cobData).map(r=>r.inq))].sort();
    const iOpts=allInqs.map(i=>'<option value="'+esc(i)+'"'+(cobRI===i?' selected':'')+'>'+esc(i)+'</option>').join('');

    // Period filters - only past months
    const now=new Date();
    const nowYM=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
    const allRepMeses=cobMeses.filter(m=>m<=nowYM).sort();
    const repStart=window.cobRepStart||(allRepMeses[0]||'2025-01');
    const repEnd=window.cobRepEnd||(nowYM<=allRepMeses[allRepMeses.length-1]?nowYM:allRepMeses[allRepMeses.length-1]);
    window.cobRepStart=repStart; window.cobRepEnd=repEnd;

    const mesOpts=allRepMeses.map(m=>'<option value="'+m+'">'+mlf(m)+'</option>').join('');

    let repBody='<div class="card" style="text-align:center;color:var(--muted);padding:3rem">Selecciona un inquilino para ver su reporte</div>';

    if(cobRI&&allT[cobRI]){
      const td=allT[cobRI];
      // Filter to selected period, only past months, only months with canon or monto
      const tMeses=Object.keys(td).sort().filter(m=>{
        if(m>nowYM)return false; // no future
        if(m<repStart||m>repEnd)return false;
        return td[m].canon>0||td[m].monto>0;
      });

      if(!tMeses.length){
        repBody='<div class="card" style="color:var(--muted);text-align:center;padding:2rem">Sin datos para el período seleccionado</div>';
      } else {
        const lastD=td[tMeses[tMeses.length-1]];
        const totCobR=tMeses.reduce((s,m)=>s+(td[m]?.monto||0),0);
        const balActual=lastD.balance||0;
        const canonActual=lastD.canon||0;
        // Meses de retraso = |balance| / canon (only if negative balance)
        const mesesAtr=canonActual>0&&balActual<0?Math.round(Math.abs(balActual)/canonActual*10)/10:0;
        const pg2=tMeses.filter(m=>{const st=td[m]?.pago||'';return st==='Si'||st.includes('Adelantado');}).length;
        const at2=tMeses.filter(m=>(td[m]?.pago||'').includes('Atrasado')).length;
        const np2=tMeses.filter(m=>(td[m]?.pago||'')==='No').length;
        const montos=tMeses.map(m=>td[m]?.monto||0);
        const balances=tMeses.map(m=>td[m]?.balance||0);

        repBody='<div class="rep-hdr">'
          +'<div style="font-size:11px;color:var(--muted)">Fecha de Reporte: '+mlf(tMeses[0])+' — '+mlf(tMeses[tMeses.length-1])+'</div>'
          +'<h2>Reporte de Cobranzas Vs Balance</h2>'
          +'<div style="font-size:15px;font-weight:600;color:var(--accent)">'+esc(cobRI)+'</div>'
          +'</div>'
          +'<div class="rkpis">'
            +'<div class="kpi pos"><div class="kpi-label">Total cobrado</div><div class="kpi-value">$'+Math.round(totCobR).toLocaleString()+'</div><div class="kpi-sub">'+pg2+' meses pagados</div></div>'
            +'<div class="kpi neg"><div class="kpi-label">Balance actual</div><div class="kpi-value" style="color:'+(balActual<0?'var(--red)':balActual>0?'var(--green)':'var(--muted)')+'">$'+Math.round(balActual).toLocaleString()+'</div><div class="kpi-sub">'+(balActual<0?'Debe':'Al día')+'</div></div>'
            +'<div class="kpi neu"><div class="kpi-label">Meses de retraso</div><div class="kpi-value" style="color:'+(mesesAtr>3?'var(--red)':mesesAtr>0?'var(--amber)':'var(--green)')+'">'+mesesAtr+'</div><div class="kpi-sub">Balance ÷ Canon</div></div>'
            +'<div class="kpi bal"><div class="kpi-label">Canon vigente</div><div class="kpi-value">$'+Math.round(canonActual).toLocaleString()+'</div><div class="kpi-sub">'+np2+' meses sin pagar</div></div>'
          +'</div>'
          +'<div class="card">'
            +'<div class="card-title" style="display:flex;justify-content:space-between;align-items:center">'
              +'<span>Pagos vs Balance — '+esc(cobRI)+'</span>'
              +'<button class="btn" style="font-size:11px;padding:4px 10px" onclick="window.print()">🖨 Imprimir</button>'
            +'</div>'
            +'<div class="chart-wrap"><canvas id="ch-rep" style="max-height:240px"></canvas></div>'
          +'</div>'
          +'<div class="card" style="padding:0"><div class="tbl-wrap"><table class="ct">'
            +'<thead><tr>'
              +'<th>Mes</th><th>Canon</th><th>Pagado</th><th>Balance</th>'
              +'<th>Meses retraso</th><th>Estado</th>'
            +'</tr></thead>'
            +'<tbody>'+tMeses.map(m=>{
              const d=td[m]||{};const st=d.pago||'';
              const bal=d.balance||0;
              const can=d.canon||0;
              const mr=can>0&&bal<0?Math.round(Math.abs(bal)/can*10)/10:0;
              const mrColor=mr>3?'var(--red)':mr>1?'var(--amber)':'var(--muted)';
              const stBadge=st.includes('Atrasado')?'<span style="color:var(--amber);font-weight:600">⚠ Atrasado</span>'
                :st==='Si'||st.includes('Adelantado')?'<span style="color:var(--green);font-weight:600">✓ '+st+'</span>'
                :'<span style="color:var(--red)">✗ No pagó</span>';
              return '<tr>'
                +'<td>'+mlf(m)+'</td>'
                +'<td>'+( can>0?'$'+Math.round(can).toLocaleString():'—')+'</td>'
                +'<td style="color:var(--green);font-weight:600">'+(d.monto>0?'$'+Math.round(d.monto).toLocaleString():'—')+'</td>'
                +'<td style="color:'+(bal<0?'var(--red)':'var(--green)')+'">$'+Math.round(bal).toLocaleString()+'</td>'
                +'<td style="color:'+mrColor+';font-weight:600">'+(mr>0?mr+' mes'+(mr!==1?'es':''):'—')+'</td>'
                +'<td>'+stBadge+'</td>'
                +'</tr>';
            }).join('')
            +'</tbody></table></div></div>';

        setTimeout(()=>{
          const ctx=$('ch-rep');if(!ctx)return;
          if(cobCharts.rep)cobCharts.rep.destroy();
          cobCharts.rep=new Chart(ctx,{type:'bar',
            data:{labels:tMeses.map(m=>mlf(m)),datasets:[
              {label:'Cobrado',data:montos,backgroundColor:'rgba(79,142,247,.75)',borderRadius:4},
              {label:'Balance',data:balances,type:'line',borderColor:'#f5a623',backgroundColor:'transparent',
               borderWidth:2.5,pointRadius:5,pointBackgroundColor:'#f5a623',tension:0.3}
            ]},
            options:{responsive:true,maintainAspectRatio:false,
              plugins:{legend:{position:'top',labels:{color:tc,font:{size:11},padding:12,boxWidth:12}},
                tooltip:{callbacks:{label:c=>' '+c.dataset.label+': $'+Math.round(c.raw).toLocaleString()}}},
              scales:{x:{ticks:{color:tc,font:{size:10},maxRotation:45},grid:{color:gc}},
                y:{ticks:{color:tc,font:{size:10},callback:v=>'$'+Math.round(v).toLocaleString()},grid:{color:gc}}}}
          });
        },100);
      }
    }

    body='<div class="cob-bar" style="margin-bottom:1rem;flex-wrap:wrap;gap:8px">'
      +'<select class="cs" style="min-width:260px" onchange="cobRI=this.value;window.cobRepStart=cobRepStart;window.cobRepEnd=cobRepEnd;killCob();renderCob()"><option value="">— Seleccionar inquilino —</option>'+iOpts+'</select>'
      +(cobRI?'<span style="font-size:11px;color:var(--muted)">Período:</span>'
        +'<select class="cs" onchange="window.cobRepStart=this.value;killCob();renderCob()"><option value="">Desde...</option>'+allRepMeses.map(m=>'<option value="'+m+'"'+(m===repStart?' selected':'')+'>'+mlf(m)+'</option>').join('')+'</select>'
        +'<select class="cs" onchange="window.cobRepEnd=this.value;killCob();renderCob()"><option value="">Hasta...</option>'+allRepMeses.map(m=>'<option value="'+m+'"'+(m===repEnd?' selected':'')+'>'+mlf(m)+'</option>').join('')+'</select>'
        +(cobRI?'<button class="btn" style="font-size:11px;padding:5px 10px" onclick="window.print()">🖨 PDF</button>':'')
        :'')
      +'</div>'
      +repBody;
  }

  $('page-cobranzas').innerHTML=savedBar+topBar+kpiBar+body;
}

// ── SAVED REPORTS ──
function saveReport(){
  const label=prompt('Nombre para esta vista (ej: "Ene-Mar 2026 Liderpark"):');
  if(!label)return;
  savedReports.push({label,view:cobView,mf:cobMF,inf:cobIF,ri:cobRI});
  localStorage.setItem('cobReports',JSON.stringify(savedReports));
  renderCob();
}
function loadReport(i){
  const r=savedReports[i];if(!r)return;
  cobView=r.view;cobMF=r.mf;cobIF=r.inf;cobRI=r.ri;
  showCob(cobView);
}
function delReport(i){
  savedReports.splice(i,1);
  localStorage.setItem('cobReports',JSON.stringify(savedReports));
  renderCob();
}
function rerender(){buildFilters();saveSession();renderCurrentPage(applyFilters());}
function toggleSidebar(){$('sidebar').classList.toggle('open');$('overlay').style.display=$('sidebar').classList.contains('open')?'block':'none';}
function closeSidebar(){$('sidebar').classList.remove('open');$('overlay').style.display='none';}
function loadData(){
  $('meta-txt').textContent='Actualizando...';killCharts();
  ['resumen','movimientos','ranking','categorias'].forEach(p=>{$('page-'+p).innerHTML='<div class="loading"><div class="spin"></div>Cargando...</div>';});
  $('kpi-grid').innerHTML='';
  Papa.parse(CSV+'&nocache='+Date.now(),{download:true,header:true,skipEmptyLines:true,
    complete(res){if(!res.data||!res.data.length){$('page-resumen').innerHTML='<div class="loading">Sin datos</div>';return;}allRows=res.data;C=mapCols(res.meta.fields||[]);$('meta-txt').textContent=`Actualizado ${new Date().toLocaleString('es-VE')} · ${allRows.length} reg.`;buildFilters();restoreSession();renderCurrentPage(applyFilters());},
    error(e){$('page-resumen').innerHTML=`<div class="loading">Error: ${esc(e.message)}</div>`;}
  });
}
loadData();
</script>
</body>
</html>
