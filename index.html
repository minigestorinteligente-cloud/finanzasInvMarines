<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controlador Finanzas 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f4f6f9; color: #1a1a2e; min-height: 100vh; }
  .topbar { background: #1a1a2e; color: #fff; padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  .topbar h1 { font-size: 18px; font-weight: 600; }
  .topbar .meta { font-size: 12px; opacity: 0.6; margin-top: 3px; }
  .refresh-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .refresh-btn:hover { background: rgba(255,255,255,0.2); }
  .container { max-width: 1300px; margin: 0 auto; padding: 1.5rem; }
  .error-box { background: #fff0ed; border-left: 4px solid #D85A30; border-radius: 8px; padding: 1rem 1.25rem; margin-bottom: 1.5rem; font-size: 13px; color: #7a2e10; }
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 1.5rem; }
  .kpi { background: #fff; border-radius: 12px; padding: 1.25rem; box-shadow: 0 1px 4px rgba(0,0,0,0.06); border-top: 3px solid #e0e0e0; }
  .kpi.pos { border-top-color: #1D9E75; }
  .kpi.neg { border-top-color: #D85A30; }
  .kpi.bal-pos { border-top-color: #185FA5; }
  .kpi.bal-neg { border-top-color: #a32d2d; }
  .kpi-label { font-size: 11px; color: #888; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .kpi-value { font-size: 20px; font-weight: 700; color: #1a1a2e; word-break: break-all; }
  .kpi.pos .kpi-value { color: #1D9E75; }
  .kpi.neg .kpi-value { color: #D85A30; }
  .kpi.bal-pos .kpi-value { color: #185FA5; }
  .kpi.bal-neg .kpi-value { color: #a32d2d; }
  .kpi-sub { font-size: 11px; color: #aaa; margin-top: 6px; }
  .filters { background: #fff; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1.5rem; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .filters label { font-size: 12px; color: #888; font-weight: 500; }
  .filters select { border: 1px solid #e0e0e0; border-radius: 6px; padding: 5px 10px; font-size: 13px; background: #f9f9f9; color: #1a1a2e; cursor: pointer; }
  .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 1.5rem; }
  .chart-card { background: #fff; border-radius: 12px; padding: 1.25rem; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .chart-card.full { grid-column: 1 / -1; }
  .chart-title { font-size: 12px; font-weight: 600; color: #555; margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.4px; }
  .table-card { background: #fff; border-radius: 12px; padding: 1.25rem; box-shadow: 0 1px 4px rgba(0,0,0,0.06); overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px 10px; color: #888; font-weight: 600; border-bottom: 2px solid #f0f0f0; font-size: 11px; text-transform: uppercase; letter-spacing: 0.4px; white-space: nowrap; }
  td { padding: 8px 10px; color: #1a1a2e; border-bottom: 1px solid #f5f5f5; white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafafa; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .ing { background: #e1f5ee; color: #0F6E56; }
  .eg  { background: #faece7; color: #993C1D; }
  .loading { text-align: center; padding: 4rem; color: #aaa; font-size: 15px; }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #e0e0e0; border-top-color: #185FA5; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 640px) { .charts-grid { grid-template-columns: 1fr; } .chart-card.full { grid-column: 1; } }
</style>
</head>
<body>
<div class="topbar">
  <div>
    <h1>📊 Controlador Finanzas 2026</h1>
    <div class="meta" id="meta-txt">Conectando con Google Sheets...</div>
  </div>
  <button class="refresh-btn" onclick="loadData()">↻ Actualizar</button>
</div>
<div class="container">
  <div id="err-box" style="display:none"></div>
  <div id="app"><div class="loading"><span class="spinner"></span>Cargando datos...</div></div>
</div>
<script>
const CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRiMekDVhvEC1crwqEsgKj-S9FX9rkMhuzrQ84C-8SCo-qFD2oi6943XF6l6PUVzGLsVhyJVUSMztHa/pub?gid=1817920401&single=true&output=csv';

let allRows = [], chartObjs = {};
const $ = id => document.getElementById(id);

function fmt(n) {
  return new Intl.NumberFormat('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(n || 0);
}

function parseNum(v) {
  if (v === null || v === undefined || v === '') return 0;
  let s = String(v).replace(/[^0-9,.\-]/g, '');
  if (s.match(/,\d{2}$/)) {
    s = s.replace(/\./g, '').replace(',', '.');
  } else {
    s = s.replace(/,/g, '');
  }
  return parseFloat(s) || 0;
}

function isIngreso(row) {
  const keys = Object.keys(row);
  const key = keys.find(k => k.toUpperCase().includes('INGRESO') || k.toUpperCase().includes('EGRESO'));
  const t = String(row[key] || '').toLowerCase().trim();
  return t.includes('ingr') || t.includes('entr') || t.includes('abono') || t.includes('cred');
}

function getMontoUSD(row) {
  const key = Object.keys(row).find(k => k.toLowerCase().includes('usd'));
  if (key) return parseNum(row[key]);
  return 0;
}

function getBanco(row) {
  const key = Object.keys(row).find(k => k.toLowerCase().includes('banco'));
  return key ? (row[key] || '') : '';
}

function getFecha(row) {
  const key = Object.keys(row).find(k => k.toLowerCase().includes('fecha'));
  return key ? (row[key] || '') : '';
}

function getCategoria(row) {
  const key = Object.keys(row).find(k => k.toLowerCase().includes('categ'));
  return key ? (row[key] || '') : '';
}

function getTipo(row) {
  const key = Object.keys(row).find(k => k.toLowerCase() === 'tipo');
  return key ? (row[key] || '') : '';
}

function getComentario(row) {
  const key = Object.keys(row).find(k => k.toLowerCase().includes('coment'));
  return key ? (row[key] || '') : '';
}

function killCharts() {
  Object.values(chartObjs).forEach(c => { try { c.destroy(); } catch(e){} });
  chartObjs = {};
}

function render(rows) {
  killCharts();
  const ing = rows.filter(r => isIngreso(r));
  const eg  = rows.filter(r => !isIngreso(r));
  const totalIng = ing.reduce((s, r) => s + getMontoUSD(r), 0);
  const totalEg  = eg.reduce((s,  r) => s + getMontoUSD(r), 0);
  const bal = totalIng - totalEg;

  const bancos = [...new Set(rows.map(r => getBanco(r)).filter(Boolean))].sort();
  const cats   = [...new Set(rows.map(r => getCategoria(r)).filter(Boolean))].sort();
  const tipos  = [...new Set(rows.map(r => getTipo(r)).filter(Boolean))].sort();

  let flt = `<label>Tipo mov.:</label><select id="f-tipo" onchange="applyF()"><option value="">Todos</option><option>Ingreso</option><option>Egreso</option></select>`;
  if (bancos.length) flt += `<label>Banco:</label><select id="f-banco" onchange="applyF()"><option value="">Todos</option>${bancos.map(b=>`<option>${b}</option>`).join('')}</select>`;
  if (cats.length)   flt += `<label>Categoría:</label><select id="f-cat" onchange="applyF()"><option value="">Todas</option>${cats.map(b=>`<option>${b}</option>`).join('')}</select>`;
  if (tipos.length)  flt += `<label>Tipo:</label><select id="f-subtipo" onchange="applyF()"><option value="">Todos</option>${tipos.map(b=>`<option>${b}</option>`).join('')}</select>`;

  const recent = [...rows].reverse().slice(0, 25);
  const tbody = recent.map(r => {
    const esIng = isIngreso(r);
    const monto = getMontoUSD(r);
    const desc = getComentario(r) || getTipo(r) || '';
    return `<tr>
      <td>${getFecha(r)}</td>
      <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis">${desc}</td>
      <td>${getBanco(r)}</td>
      <td>${getCategoria(r)}</td>
      <td><span class="badge ${esIng?'ing':'eg'}">${esIng?'Ingreso':'Egreso'}</span></td>
      <td style="text-align:right;font-weight:600;color:${esIng?'#1D9E75':'#D85A30'}">$${fmt(monto)}</td>
    </tr>`;
  }).join('');

  $('app').innerHTML = `
    <div class="kpi-grid">
      <div class="kpi pos"><div class="kpi-label">↑ Ingresos USD</div><div class="kpi-value">$${fmt(totalIng)}</div><div class="kpi-sub">${ing.length} movimientos</div></div>
      <div class="kpi neg"><div class="kpi-label">↓ Egresos USD</div><div class="kpi-value">$${fmt(totalEg)}</div><div class="kpi-sub">${eg.length} movimientos</div></div>
      <div class="kpi ${bal>=0?'bal-pos':'bal-neg'}"><div class="kpi-label">⚖ Balance USD</div><div class="kpi-value">$${fmt(Math.abs(bal))}</div><div class="kpi-sub">${bal>=0?'Superávit':'Déficit'}</div></div>
      <div class="kpi"><div class="kpi-label">≡ Registros</div><div class="kpi-value">${rows.length}</div><div class="kpi-sub">total movimientos</div></div>
    </div>
    <div class="filters">${flt}</div>
    <div class="charts-grid">
      <div class="chart-card"><div class="chart-title">Ingresos vs Egresos (USD)</div><canvas id="ch-pie"></canvas></div>
      <div class="chart-card"><div class="chart-title">Movimientos por mes (USD)</div><canvas id="ch-bar"></canvas></div>
      ${cats.length ? `<div class="chart-card full"><div class="chart-title">Egresos por categoría (USD)</div><canvas id="ch-cat"></canvas></div>` : ''}
    </div>
    <div class="table-card">
      <div class="chart-title" style="margin-bottom:14px">Últimos movimientos</div>
      <table>
        <thead><tr><th>Fecha</th><th>Comentario</th><th>Banco</th><th>Categoría</th><th>Tipo</th><th style="text-align:right">Monto USD</th></tr></thead>
        <tbody>${tbody}</tbody>
      </table>
    </div>`;

  chartObjs.pie = new Chart($('ch-pie').getContext('2d'), {
    type: 'doughnut',
    data: { labels: ['Ingresos', 'Egresos'], datasets: [{ data: [totalIng, totalEg], backgroundColor: ['#1D9E75', '#D85A30'], borderWidth: 0 }] },
    options: { plugins: { legend: { position: 'bottom', labels: { font: { size: 12 } } } }, cutout: '65%' }
  });

  const byM = {};
  rows.forEach(r => {
    let k = String(getFecha(r)).substring(0, 7);
    if (!k || k.length < 4) return;
    if (!byM[k]) byM[k] = {i:0, e:0};
    if (isIngreso(r)) byM[k].i += getMontoUSD(r);
    else              byM[k].e += getMontoUSD(r);
  });
  const ms = Object.keys(byM).sort();
  if (ms.length) {
    chartObjs.bar = new Chart($('ch-bar').getContext('2d'), {
      type: 'bar',
      data: { labels: ms, datasets: [
        { label: 'Ingresos', data: ms.map(m => Math.round(byM[m].i)), backgroundColor: '#1D9E75' },
        { label: 'Egresos',  data: ms.map(m => Math.round(byM[m].e)), backgroundColor: '#D85A30' }
      ]},
      options: { plugins: { legend: { labels: { font: { size: 11 } } } }, scales: { x: { ticks: { font: { size: 10 } } }, y: { ticks: { font: { size: 10 }, callback: v => '$'+v.toLocaleString() } } } }
    });
  }

  if (cats.length) {
    const byCat = {};
    eg.forEach(r => {
      const cat = getCategoria(r) || 'Sin categoría';
      byCat[cat] = (byCat[cat]||0) + getMontoUSD(r);
    });
    const sorted = Object.keys(byCat).sort((a,b) => byCat[b]-byCat[a]).slice(0,10);
    chartObjs.cat = new Chart($('ch-cat').getContext('2d'), {
      type: 'bar',
      data: { labels: sorted, datasets: [{ label: 'Egresos USD', data: sorted.map(k => Math.round(byCat[k])), backgroundColor: '#D85A30' }] },
      options: { indexAxis: 'y', plugins: { legend: { display: false } }, scales: { x: { ticks: { font: { size: 10 }, callback: v => '$'+v.toLocaleString() } }, y: { ticks: { font: { size: 10 } } } } }
    });
  }
}

function applyF() {
  const tipo    = $('f-tipo')?.value    || '';
  const banco   = $('f-banco')?.value   || '';
  const cat     = $('f-cat')?.value     || '';
  const subtipo = $('f-subtipo')?.value || '';
  const filtered = allRows.filter(r => {
    if (tipo === 'Ingreso' && !isIngreso(r)) return false;
    if (tipo === 'Egreso'  &&  isIngreso(r)) return false;
    if (banco   && getBanco(r)     !== banco)   return false;
    if (cat     && getCategoria(r) !== cat)     return false;
    if (subtipo && getTipo(r)      !== subtipo) return false;
    return true;
  });
  render(filtered);
  if (tipo)    $('f-tipo').value    = tipo;
  if (banco  && $('f-banco'))    $('f-banco').value    = banco;
  if (cat    && $('f-cat'))      $('f-cat').value      = cat;
  if (subtipo && $('f-subtipo')) $('f-subtipo').value  = subtipo;
}

function loadData() {
  $('err-box').style.display = 'none';
  $('meta-txt').textContent = 'Actualizando...';
  $('app').innerHTML = '<div class="loading"><span class="spinner"></span>Cargando datos...</div>';
  Papa.parse(CSV + '&nocache=' + Date.now(), {
    download: true, header: true, skipEmptyLines: true,
    complete(res) {
      if (!res.data || res.data.length === 0) {
        showErr('No se encontraron datos. Columnas: ' + (res.meta.fields||[]).join(' | '));
        return;
      }
      allRows = res.data;
      $('meta-txt').textContent = `Actualizado: ${new Date().toLocaleString('es-VE')} · ${allRows.length} registros`;
      render(allRows);
    },
    error(e) { showErr('Error de conexión: ' + e.message); }
  });
}

function showErr(msg) {
  $('err-box').innerHTML = `<div class="error-box">${msg}</div>`;
  $('err-box').style.display = 'block';
  $('app').innerHTML = '';
  $('meta-txt').textContent = 'Error al cargar';
}

loadData();
</script>
</body>
</html>
